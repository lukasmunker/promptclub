- id: endpoint-pr
  term: Partial Response
  aliases:
  - PR
  category: endpoint
  short_definition: Partial Response is a reduction in the sum of the longest diameters
    of target lesions of at least 30% from baseline, without the complete disappearance
    required for Complete Response, sustained for the minimum specified duration.
  clinical_context: PR is defined under RECIST 1.1 as a ≥30% decrease in the sum of
    target lesion diameters relative to the baseline sum, and together with CR constitutes
    the numerator of the Objective Response Rate. Confirmation with a repeat scan
    at least four weeks after the criteria are first met is required in non-randomized
    trials to avoid false-positive classification. PR may reflect meaningful tumor
    shrinkage and symptomatic improvement even when CR is not achievable, and in some
    malignancies the distinction between deep PR and CR is prognostically significant.
    Disease-specific response criteria in hematology or neuroendocrine tumors may
    apply different thresholds or additional markers beyond radiologic measurement.
