  - KRAS codon 12 cysteine substitution
  category: biomarker
  short_definition: A point mutation in codon 12 of the KRAS oncogene substituting
    glycine with cysteine (G12C), locking KRAS in a GTP-bound active conformation
    and chronically activating downstream RAS signaling. The resulting cysteine residue
    creates a targetable binding pocket exploited by covalent KRAS G12C inhibitors.
  clinical_context: KRAS G12C occurs in approximately 13% of NSCLC adenocarcinomas,
    3–4% of colorectal cancers, and 2% of pancreatic cancers, and is more prevalent
    in current or former smokers. Sotorasib (Lumakras) and adagrasib (Krazati) are
    FDA-approved KRAS G12C inhibitors for previously treated NSCLC; adagrasib received
    additional approval for KRAS G12C-mutated colorectal cancer in combination with
    cetuximab. Companion diagnostic testing for KRAS G12C is required by FDA labeling
    for both agents. KRAS G12C was historically considered undruggable; its selective
    covalent inhibition represents a major advance in RAS-driven oncology.
