  term: Hormone Receptor-Positive Breast Cancer
  aliases:
  - HR+ BC
  - HR-positive breast cancer
  - ER-positive breast cancer
  - luminal breast cancer
  category: tumor-type
  short_definition: Hormone receptor-positive breast cancer expresses estrogen receptor
    (ER) and/or progesterone receptor (PR) and represents the most common molecular
    subtype of breast cancer, comprising approximately 70% of all cases. This subtype
    is generally amenable to endocrine-based therapies.
  clinical_context: HR-positive breast cancer is further stratified by HER2 status
    and tumor genomic risk (e.g., Oncotype DX recurrence score). Adjuvant endocrine
    therapy (tamoxifen or aromatase inhibitors) reduces recurrence risk; CDK4/6 inhibitors
    combined with endocrine therapy are established as first-line standard of care
    in HR+/HER2-negative metastatic disease. Disease may exhibit late recurrence,
    necessitating extended endocrine therapy in high-risk patients.
