- id: treatment-line-neoadjuvant
  term: Neoadjuvant Therapy
  aliases:
  - neoadjuvant
  - neoadjuvant treatment
  - pre-operative therapy
  - primary systemic therapy
  - induction chemotherapy (breast)
  category: treatment-line
  short_definition: Systemic or radiation treatment administered before the primary
    curative-intent procedure (typically surgery) with the goals of reducing tumor
    burden, enabling resection, or testing tumor chemosensitivity in vivo. Response
    to neoadjuvant treatment informs prognosis and may guide subsequent adjuvant therapy.
  clinical_context: Neoadjuvant therapy is given prior to the primary surgical procedure
    and is gated by a confirmed pathologic diagnosis, baseline staging to exclude
    distant metastases, and sufficient performance status. Pathologic complete response
    (pCR) at surgery serves as a surrogate endpoint for long-term outcomes in some
    tumor types, notably high-risk early breast cancer and gastroesophageal cancer.
    A representative example is neoadjuvant FLOT (fluorouracil, leucovorin, oxaliplatin,
    docetaxel) for resectable gastric or gastroesophageal junction adenocarcinoma.
    Post-neoadjuvant adjuvant therapy (e.g., ado-trastuzumab emtansine for residual
    HER2-positive breast cancer after neoadjuvant taxane plus trastuzumab) is increasingly
    part of the treatment paradigm.
