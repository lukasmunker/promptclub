    prognosis and rising incidence in Western countries.
  clinical_context: 'Cholangiocarcinoma is rare overall but is the second most common
    primary hepatic malignancy. Surgical resection is the only potentially curative
    treatment but is feasible in a minority of patients at presentation. First-line
