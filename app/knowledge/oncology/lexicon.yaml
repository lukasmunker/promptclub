- id: endpoint-pd
  term: Pharmacodynamics
  aliases:
  - PD
  category: endpoint
  short_definition: Pharmacodynamics describes the biochemical and physiological effects
    of a drug and its mechanism of action in the body, including the relationship
    between drug concentration and therapeutic or adverse effect.
  clinical_context: PD endpoints in oncology include biomarker measurements such as
    target occupancy, pathway modulation (e.g., phosphoprotein levels), circulating
    tumor DNA dynamics, and immune cell subset changes that provide mechanistic evidence
    of drug activity at the intended target. PD assessments are integral to proof-of-concept
    studies and dose-selection decisions in early-phase oncology trials by confirming
    on-target biological activity at or below the MTD. The NCI Thesaurus defines pharmacodynamics
    as the study of the biochemical and physiological effects of a drug and the mechanisms
    of drug action. Integration of PK and PD data into PK-PD models allows characterization
    of the exposure-effect relationship and rational selection of the dose and schedule
    for Phase II testing.
