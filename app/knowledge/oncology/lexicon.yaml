- id: endpoint-ttf
  term: Time to Treatment Failure
  aliases:
  - TTF
  category: endpoint
  short_definition: Time to Treatment Failure is the time from randomization until
    discontinuation of treatment for any reason, including disease progression, toxicity,
    patient preference, or death.
  clinical_context: TTF is a composite endpoint that conflates efficacy signals with
    safety and patient-preference signals, making it difficult to attribute observed
    differences to anti-tumor activity alone. The FDA guidance notes that TTF is generally
    not recommended as a sole regulatory endpoint because it reflects a mixture of
    outcomes that are not independently clinically interpretable. It may be used as
    a supportive or exploratory endpoint to describe real-world treatment patterns
    and tolerability in parallel with efficacy endpoints. Protocol-level definitions
    of treatment failure must enumerate all stopping rules to ensure consistent data
    collection across sites.
  typical_values: null
  related_terms:
