- id: tumor-type-endometrial-cancer
  term: Endometrial Cancer
  aliases:
  - endometrial carcinoma
  - uterine cancer
  - cancer of the uterus
  - uterine corpus cancer
  - uterine endometrioid carcinoma
  category: tumor-type
  short_definition: Endometrial cancer is the most common gynecologic malignancy in
    developed countries, arising from the endometrial glands or stroma; endometrioid
    adenocarcinoma is the predominant histologic type. Obesity, unopposed estrogen
    exposure, and Lynch syndrome are established risk factors.
  clinical_context: Most endometrial cancers are diagnosed at an early stage due to
    postmenopausal uterine bleeding, with relatively favorable outcomes for early-stage
    disease treated surgically. TCGA molecular classification (POLE-ultramutated,
    MSI-hypermutated, copy-number low, copy-number high/serous-like) has important
    prognostic and predictive implications. Immune checkpoint inhibition (pembrolizumab,
    dostarlimab) is approved for advanced/recurrent MMR-deficient/MSI-high disease;
    lenvatinib plus pembrolizumab is approved for advanced endometrial carcinoma regardless
    of MMR/MSI status after prior platinum-based therapy.
