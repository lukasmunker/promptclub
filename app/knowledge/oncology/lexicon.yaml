- id: tumor-type-mesothelioma
  term: Mesothelioma
  aliases:
  - malignant mesothelioma
  - pleural mesothelioma
  - peritoneal mesothelioma
  - malignant pleural mesothelioma
  - MPM
  category: tumor-type
  short_definition: Mesothelioma is a rare and aggressive malignancy arising from
    the mesothelial lining of the pleura, peritoneum, pericardium, or tunica vaginalis;
    malignant pleural mesothelioma (MPM) is the most common anatomic site. Prior asbestos
    exposure is the dominant risk factor, with a latency period of 20-40 years.
  clinical_context: Malignant pleural mesothelioma is rare (approximately 3,000 new
    cases annually in the US) and carries a poor prognosis with median overall survival
    of approximately 12-18 months. Epithelioid histology confers a more favorable
    prognosis compared with sarcomatoid or biphasic subtypes. First-line treatment
    is nivolumab plus ipilimumab (immune checkpoint inhibitor doublet) or cisplatin/pemetrexed
    with or without bevacizumab; surgical approaches (pleurectomy/decortication or
    extrapleural pneumonectomy) are reserved for selected patients at specialized
    centers.
