- id: tumor-type-multiple-myeloma
  term: Multiple Myeloma
  aliases:
  - MM
  - plasma cell myeloma
  - myeloma
  - Kahler disease
  category: tumor-type
  short_definition: Multiple myeloma is a malignant plasma cell neoplasm characterized
    by clonal proliferation of plasma cells in the bone marrow producing a monoclonal
    immunoglobulin (M-protein) and causing end-organ damage (hypercalcemia, renal
    failure, anemia, bone lesions). It represents approximately 10% of all hematologic
    malignancies.
  clinical_context: MM is diagnosed using the IMWG criteria requiring ≥10% clonal
    bone marrow plasma cells or biopsy-proven plasmacytoma plus at least one CRAB
    criterion or myeloma-defining event. Transplant-eligible patients receive induction
    (bortezomib/lenalidomide/dexamethasone, VRd) followed by high-dose melphalan and
    autologous stem cell transplantation. Daratumumab-based quadruplet induction regimens
    have become a preferred option. Multiple myeloma remains generally incurable but
    is increasingly managed as a chronic disease with successive lines of therapy
    including IMiDs, proteasome inhibitors, anti-CD38 antibodies, BCMA-targeted agents
    (belantamab, teclistamab, ciltacabtagene), and CAR-T therapies.
