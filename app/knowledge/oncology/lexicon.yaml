  - acute lymphoid leukemia
  category: tumor-type
  short_definition: Acute lymphoblastic leukemia is a malignant neoplasm of lymphoid
    progenitor cells (B-cell or T-cell lineage) characterized by rapid proliferation
    of immature lymphoblasts in the bone marrow, peripheral blood, and extramedullary
    sites. It is the most common cancer in children but also occurs in adults.
  clinical_context: ALL in children carries a favorable prognosis (cure rates >90%
    with modern therapy), whereas adult ALL is associated with poorer outcomes. Philadelphia
    chromosome-positive ALL (BCR-ABL1 fusion) occurs in approximately 25% of adult
    cases and is treated with tyrosine kinase inhibitors (imatinib, dasatinib, ponatinib)
    plus chemotherapy. Blinatumomab (bispecific T-cell engager), inotuzumab ozogamicin,
    and CAR-T cell therapies (tisagenlecleucel) are approved for relapsed/refractory
    B-cell ALL. MRD assessment guides consolidation and transplant decisions.
