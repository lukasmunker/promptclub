- id: endpoint-sd
  term: Stable Disease
  aliases:
  - SD
  category: endpoint
  short_definition: Stable Disease is the radiologic response category assigned when
    tumor burden has neither decreased sufficiently to qualify as Partial Response
    nor increased sufficiently to meet criteria for Progressive Disease.
  clinical_context: 'Under RECIST 1.1, SD is defined as neither a ≥30% decrease nor
    a ≥20% increase in the sum of target lesion diameters relative to the smallest
    on-study sum (nadir), in the absence of new lesions. SD alone does not contribute
    to ORR but is included in the numerator of the Disease Control Rate alongside
    CR and PR. The clinical significance of SD is context-dependent: durable SD in
    an aggressive malignancy may represent meaningful disease control, whereas SD
    in an indolent tumor may represent natural history. Duration of SD is therefore
    an important qualifier when reporting disease control outcomes.'
  typical_values: null
  related_terms:
