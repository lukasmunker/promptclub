  category: study-design
  short_definition: A master protocol design that evaluates a single targeted therapy
    in multiple cancer types (baskets) defined by a shared molecular alteration rather
    than by histological origin. Each tumor type constitutes a separate sub-study
    or cohort.
  clinical_context: Basket trials are used to efficiently evaluate drugs targeting
    oncogenic driver alterations (e.g., BRAF V600E, NTRK fusions) across diverse tumor
    histologies within a single protocol framework. They support tumor-agnostic drug
    approvals by FDA when a biomarker-defined patient population responds consistently
    regardless of primary tumor site. Statistical designs must pre-specify how information
    is shared across baskets (e.g., Bayesian hierarchical models) and address the
    heterogeneity of response across tumor types. The FDA Master Protocols guidance
    provides regulatory considerations for basket trial design and conduct.
