- id: tumor-type-mantle-cell-lymphoma
  term: Mantle Cell Lymphoma
  aliases:
  - MCL
  - mantle zone lymphoma
  category: tumor-type
  short_definition: Mantle cell lymphoma is an aggressive B-cell non-Hodgkin lymphoma
    characterized by the translocation t(11;14)(q13;q32), leading to overexpression
    of cyclin D1 and dysregulation of the cell cycle. It typically presents at an
    advanced stage and follows a predominantly aggressive clinical course.
  clinical_context: MCL accounts for approximately 3-6% of all non-Hodgkin lymphomas
    and most commonly presents with widespread lymphadenopathy, bone marrow involvement,
    and gastrointestinal involvement. First-line treatment for young, fit patients
    includes intensive immunochemotherapy (R-CHOP or R-DHAP alternating) with high-dose
    cytarabine followed by autologous stem cell transplantation and rituximab maintenance;
    bendamustine-rituximab is commonly used for older/less fit patients. Ibrutinib,
    acalabrutinib, and zanubrutinib (BTK inhibitors) are approved for relapsed/refractory
    MCL; brexucabtagene autoleucel (CAR-T) is approved in the relapsed setting. The
    blastoid and pleomorphic variants carry a particularly poor prognosis.
