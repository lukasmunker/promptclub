  last_reviewed: null
- id: biomarker-idh2-mutation
  term: IDH2 Mutation
  aliases:
  - IDH2 R140Q
  - IDH2 R172K
  - Isocitrate Dehydrogenase 2 mutation
  - IDH2 hotspot mutation
  category: biomarker
  short_definition: Somatic gain-of-function mutations in the IDH2 gene, predominantly
    at codons R140 and R172, conferring neomorphic enzymatic activity that produces
    the oncometabolite 2-hydroxyglutarate (2-HG) in a manner analogous to IDH1 mutations,
    driving epigenetic reprogramming and differentiation block. IDH2 mutation is a
    diagnostic and predictive biomarker in AML and glioma.
  clinical_context: IDH2 mutations occur in approximately 8–12% of AML and at lower
    frequencies in myelodysplastic syndromes (MDS); they also define a molecular subtype
    of WHO-classified diffuse glioma. Enasidenib (Idhifa), a selective IDH2 inhibitor,
    is FDA-approved for relapsed/refractory IDH2-mutated AML with a required FDA companion
    diagnostic test. IDH2 mutations in AML can occur at R140 (promoting differentiation
    block) or R172 (associated with a distinct biology and lower response to enasidenib
    in some studies). IDH1 and IDH2 mutations are mutually exclusive in most tumor
    contexts.
  typical_values: null
  related_terms:
  - IDH1 mutation
  - 2-hydroxyglutarate
  - enasidenib
  - AML
  - glioma
  - differentiation syndrome
  sources:
