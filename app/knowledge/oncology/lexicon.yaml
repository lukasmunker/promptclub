  term: Head and Neck Squamous Cell Carcinoma
  aliases:
  - HNSCC
  - head and neck cancer
  - squamous cell carcinoma of the head and neck
  category: tumor-type
  short_definition: Head and neck squamous cell carcinoma is a malignancy arising
    from the squamous epithelium lining the oral cavity, oropharynx, hypopharynx,
    and larynx. It is the sixth most common cancer globally, with tobacco and alcohol
    use being the dominant risk factors for most anatomic subsites.
  clinical_context: HPV-associated oropharyngeal HNSCC (predominantly HPV16) has distinct
    epidemiology, biology, and more favorable prognosis compared with HPV-negative
    tumors; p16 IHC is used as a surrogate marker for HPV status. Locally advanced
    disease is typically managed with concurrent cisplatin-based chemoradiotherapy
    or induction chemotherapy followed by chemoradiotherapy; surgery is preferred
    for oral cavity cancers. First-line treatment for recurrent/metastatic HNSCC includes
    platinum plus 5-fluorouracil plus cetuximab (EXTREME) or pembrolizumab with or
    without chemotherapy depending on PD-L1 expression.
