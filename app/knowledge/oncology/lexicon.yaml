- id: tumor-type-rcc
  term: Renal Cell Carcinoma
  aliases:
  - RCC
  - renal cell cancer
  - kidney cancer
  - clear cell renal cell carcinoma
  - ccRCC
  category: tumor-type
  short_definition: Renal cell carcinoma is the most common malignant tumor of the
    kidney in adults, with clear cell histology accounting for approximately 75% of
    cases, followed by papillary and chromophobe subtypes. It is often discovered
    incidentally on imaging.
  clinical_context: RCC is associated with von Hippel-Lindau syndrome (VHL gene inactivation
    in clear cell RCC), obesity, hypertension, and tobacco use. Localized disease
    is managed surgically; advanced RCC first-line treatment combines VEGF/TKI therapy
    (sunitinib, pazopanib, cabozantinib, axitinib) with immune checkpoint inhibition
    (nivolumab plus ipilimumab or pembrolizumab plus axitinib). Molecular profiling
    including VHL, PBRM1, and other mutations can inform prognosis. Metastatic RCC
    prognosis has significantly improved with contemporary immunotherapy-based regimens.
