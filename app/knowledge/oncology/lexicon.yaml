- id: tumor-type-nsclc
  term: Non-Small Cell Lung Cancer
  aliases:
  - NSCLC
  - Non-Small-Cell Lung Cancer
  - non-small cell lung carcinoma
  category: tumor-type
  short_definition: Non-small cell lung cancer is the most common histologic category
    of lung cancer, encompassing adenocarcinoma, squamous cell carcinoma, and large
    cell carcinoma subtypes. It accounts for approximately 85% of all lung cancer
    diagnoses.
  clinical_context: NSCLC is the leading cause of cancer-related mortality worldwide.
    Diagnosis is typically made at an advanced stage; first-line treatment for advanced
    disease includes platinum-based doublet chemotherapy, immune checkpoint inhibitors,
    and targeted agents for driver-mutated disease (EGFR, ALK, ROS1, KRAS, MET, RET,
    NTRK, BRAF). Histologic and molecular subtyping is essential for treatment selection.
