- id: tumor-type-crc
  term: Colorectal Cancer
  aliases:
  - CRC
  - colorectal carcinoma
  - colon cancer
  - rectal cancer
  - large bowel cancer
  category: tumor-type
  short_definition: Colorectal cancer is a malignant neoplasm arising from the epithelium
    of the colon or rectum and is the third most commonly diagnosed cancer and the
    second leading cause of cancer mortality worldwide. Most cases are adenocarcinomas.
  clinical_context: CRC is strongly associated with modifiable risk factors including
    diet, physical inactivity, obesity, and alcohol use; hereditary syndromes (Lynch
    syndrome, familial adenomatous polyposis) account for a minority of cases. Molecular
    profiling—including RAS/BRAF mutation status, microsatellite instability (MSI),
    and HER2 status—guides therapy selection. First-line metastatic CRC treatment
    typically involves fluoropyrimidine-based doublet or triplet chemotherapy combined
    with bevacizumab or EGFR inhibitors (in RAS/BRAF wild-type tumors). MSI-high tumors
    are highly responsive to immune checkpoint inhibition.
