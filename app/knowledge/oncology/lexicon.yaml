- id: study-design-platform-trial
  term: Platform Trial
  aliases:
  - Platform Study
  - Multi-Arm Multi-Stage Trial
  - MAMS Trial
  category: study-design
  short_definition: A master protocol design with a perpetual, modular infrastructure
    that allows investigational arms to be added or dropped over time based on pre-specified
    decision rules, while the trial continues to enroll patients under a shared control
    arm.
  clinical_context: Platform trials are particularly efficient in oncology because
    the shared control arm reduces the total number of patients required compared
    to running separate two-arm trials for each experimental agent. New treatment
    arms can be added after the platform opens, enabling responsive evaluation of
    emerging therapies without restarting the protocol infrastructure. Pre-specified
    interim decision rules allow futile or toxic arms to be discontinued and successful
    arms to graduate to confirmatory development. The FDA Master Protocols guidance
    addresses the regulatory framework for platform trial design, including considerations
    for data sharing, type I error control, and comparability of concurrent versus
    non-concurrent controls.
  typical_values: null
  related_terms:
