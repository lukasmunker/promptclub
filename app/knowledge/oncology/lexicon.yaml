- id: tumor-type-ovarian-cancer
  term: Ovarian Cancer
  aliases:
  - ovarian carcinoma
  - epithelial ovarian cancer
  - EOC
  - fallopian tube cancer
  - primary peritoneal cancer
  category: tumor-type
  short_definition: Ovarian cancer comprises a heterogeneous group of malignancies
    arising from the ovary, fallopian tube, or peritoneum; high-grade serous carcinoma
    is the most common and lethal subtype. It is the leading cause of gynecologic
    cancer mortality in developed countries.
  clinical_context: Ovarian cancer is typically diagnosed at an advanced stage (III/IV)
    due to absence of early symptoms and lack of effective screening. Standard-of-care
    for newly diagnosed advanced disease is carboplatin plus paclitaxel combined with
    bevacizumab, followed by maintenance therapy; PARP inhibitors (olaparib, niraparib,
    rucaparib) have demonstrated efficacy in maintenance settings, particularly in
    BRCA1/2-mutated and HRD-positive tumors. BRCA1/2 germline and somatic testing
    is recommended for all patients with epithelial ovarian cancer.
