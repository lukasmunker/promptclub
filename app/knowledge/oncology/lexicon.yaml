- id: tumor-type-melanoma
  term: Melanoma
  aliases:
  - malignant melanoma
  - cutaneous melanoma
  - skin melanoma
  category: tumor-type
  short_definition: Melanoma is a malignant neoplasm arising from melanocytes, most
    commonly in the skin, and is responsible for the majority of skin cancer deaths
    despite being less common than non-melanoma skin cancers. UV radiation exposure
    is the principal risk factor for cutaneous melanoma.
  clinical_context: Cutaneous melanoma is staged by Breslow depth, ulceration, and
    nodal involvement; BRAF mutation testing (most commonly V600E/K) is required for
    all advanced-stage disease as BRAF/MEK inhibitor combinations are standard of
    care in BRAF-mutated tumors. First-line treatment for metastatic melanoma includes
    immune checkpoint inhibition (nivolumab plus ipilimumab or pembrolizumab monotherapy)
    or targeted therapy for BRAF-mutated disease. Surgical management dominates early-stage
    treatment.
