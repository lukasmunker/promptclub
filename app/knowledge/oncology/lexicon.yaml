- id: endpoint-dlt
  term: Dose-Limiting Toxicity
  aliases:
  - DLT
  category: endpoint
  short_definition: Dose-Limiting Toxicity is a pre-specified adverse effect occurring
    during the DLT observation window that is of sufficient severity or clinical significance
    to preclude further dose escalation in a Phase I trial, typically graded using
    NCI CTCAE.
  clinical_context: DLT definitions are established in the protocol before trial initiation
    and commonly include Grade 3-4 non-hematologic toxicities, Grade 4 hematologic
    toxicities lasting beyond a threshold duration, and any Grade 5 event attributable
    to the investigational agent. The observation window for DLT assessment is usually
    the first one to two treatment cycles, though extended windows may be specified
    for agents with delayed toxicity profiles. The FDA guidance references DLT as
    a Phase I endpoint intrinsically linked to MTD determination, noting that the
    specific DLT criteria must be transparently defined and consistently applied across
    all dose cohorts. Attribution of events to the investigational drug versus disease
    progression or concomitant medications requires careful clinical adjudication.
