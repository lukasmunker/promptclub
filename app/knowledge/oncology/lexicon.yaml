  - oesophageal cancer
  - esophageal squamous cell carcinoma
  - ESCC
  - esophageal adenocarcinoma
  - EAC
  category: tumor-type
  short_definition: 'Esophageal cancer encompasses two major histologic subtypes:
    squamous cell carcinoma (ESCC), predominant in Asia and Africa, and adenocarcinoma
    (EAC), predominant in Western countries and arising in the setting of Barrett
    esophagus. It is associated with high mortality due to late stage at presentation.'
  clinical_context: 'Esophageal cancer is one of the leading causes of cancer-related
    mortality worldwide; squamous cell carcinoma predominates in high-incidence geographic
    regions (East Asia). Locally advanced disease is managed with neoadjuvant chemoradiotherapy
    (CROSS regimen: paclitaxel/carboplatin) followed by surgery; perioperative chemotherapy
    (FLOT) is an alternative for gastroesophageal junction adenocarcinoma. First-line
    treatment for metastatic esophageal adenocarcinoma includes platinum-fluoropyrimidine
    chemotherapy with nivolumab; HER2 testing is required for adenocarcinoma as trastuzumab
    plus chemotherapy plus pembrolizumab is approved for HER2-positive tumors.'
