- id: study-design-umbrella-trial
  term: Umbrella Trial
  aliases:
  - Umbrella Study
  - Biomarker-Driven Umbrella Trial
  category: study-design
  short_definition: A master protocol design that evaluates multiple targeted therapies
    in a single cancer type, with patients assigned to treatment sub-studies based
    on their individual tumor molecular or biomarker profiles.
  clinical_context: Umbrella trials are used when a single tumor histology (e.g.,
    non-small cell lung cancer) is biologically heterogeneous and multiple targetable
    alterations exist in the patient population. Centralized biomarker screening assigns
    patients to the sub-study matching their molecular profile, enabling efficient
    concurrent evaluation of several agents under one protocol infrastructure. Umbrella
    trials reduce duplication of screening, consent, and site infrastructure compared
    to running multiple independent trials. Statistical considerations include managing
    multiple sub-studies, controlling type I error, and enabling sub-study-specific
    stopping rules.
  typical_values: null
