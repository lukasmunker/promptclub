- id: biomarker-bcr-abl-fusion
  term: BCR-ABL Fusion
  aliases:
  - BCR-ABL1
  - Philadelphia chromosome
  - Ph chromosome
  - t(9;22)
  - BCR::ABL1
  - p210
  - p190
  category: biomarker
  short_definition: A fusion oncogene generated by the reciprocal translocation t(9;22)(q34;q11)
    juxtaposing the BCR gene on chromosome 22 with the ABL1 tyrosine kinase gene on
    chromosome 9, producing a constitutively active BCR-ABL1 fusion kinase and the
    cytogenetically visible Philadelphia chromosome. BCR-ABL1 is the defining oncogenic
    driver and diagnostic biomarker of chronic myeloid leukemia (CML) and is also
    the target of approved tyrosine kinase inhibitors in Ph+ ALL.
  clinical_context: BCR-ABL1 is present in >95% of CML and approximately 20–30% of
    adult B-cell ALL; it is the definitive diagnostic biomarker for CML per ELN guidelines.
    FDA-approved BCR-ABL1 inhibitors—imatinib, dasatinib, nilotinib, bosutinib, ponatinib,
    and asciminib—are first-through-subsequent-line therapies for CML and Ph+ ALL;
    asciminib specifically targets the ABL myristoyl pocket and is effective against
    most kinase domain resistance mutations including T315I. BCR-ABL1 quantification
    by RT-PCR on the International Scale (IS) is used to monitor molecular response
    to TKI therapy, with a key milestone of major molecular response (MMR, BCR-ABL1
    ≤0.1% IS). TKI selection and sequencing is guided by BCR-ABL1 kinase domain mutation
    profiling at resistance.
  typical_values: null
  related_terms:
  - Philadelphia chromosome
  - CML
  - imatinib
  - dasatinib
  - nilotinib
  - bosutinib
  - ponatinib
  - asciminib
  - ABL kinase domain mutation
  - T315I
