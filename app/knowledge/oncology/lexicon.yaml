- id: biomarker-homologous-recombination-deficiency
  term: Homologous Recombination Deficiency
  aliases:
  - HRD
  - HRR deficiency
  - genomic instability score
  - GIS
  - LOH-high
  - BRCA-like
  - BRCAness
  category: biomarker
  short_definition: A state of impaired homologous recombination DNA repair resulting
    from mutations or epigenetic silencing of HR pathway genes (BRCA1, BRCA2, PALB2,
    RAD51, etc.) or their downstream effectors, detectable via genomic scar assays
    measuring loss of heterozygosity (LOH), telomeric allelic imbalance (TAI), and
    large-scale state transitions (LST). HRD is a predictive biomarker for PARP inhibitors
    and platinum-based therapies in ovarian and breast cancer.
  clinical_context: FDA-approved HRD companion diagnostic assays (Myriad myChoice
    CDx; FoundationOne CDx) measure a composite genomic instability score; a score
    ≥42 (myChoice) defines HRD-positive status for niraparib and olaparib maintenance
    therapy in ovarian cancer. Niraparib (Zejula) is approved as first-line maintenance
    for HRD-positive advanced ovarian cancer following platinum-based chemotherapy,
    regardless of BRCA mutation status. Olaparib plus bevacizumab is FDA-approved
    as maintenance for HRD-positive (including BRCA-mutated) ovarian cancer in the
    first-line setting. HRD represents a broader category than BRCA1/2 mutation alone,
    capturing tumors with BRCAness through alternate mechanisms.
  typical_values: null
  related_terms:
  - BRCA1 mutation
  - BRCA2 mutation
  - PARP inhibitor
  - olaparib
  - niraparib
  - genomic scar
  - LOH
