- id: tumor-type-tnbc
  term: Triple-Negative Breast Cancer
  aliases:
  - TNBC
  - triple negative breast cancer
  - ER-/PR-/HER2- breast cancer
  category: tumor-type
  short_definition: Triple-negative breast cancer is defined by the absence of estrogen
    receptor (ER), progesterone receptor (PR), and HER2 protein overexpression or
    gene amplification. It represents approximately 15% of all breast cancer cases
    and is associated with an aggressive clinical course.
  clinical_context: TNBC disproportionately affects younger women and those of African
    ancestry. Neoadjuvant and adjuvant chemotherapy (anthracycline- and taxane-based)
    remains a cornerstone of treatment; immune checkpoint inhibition (pembrolizumab)
    is approved in combination with chemotherapy for high-risk early-stage and unresectable
    locally advanced or metastatic TNBC. BRCA1/2 germline mutation testing is recommended,
    as PARP inhibitors are approved for BRCA-mutated metastatic TNBC.
  typical_values: null
