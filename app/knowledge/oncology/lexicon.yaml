- id: biomarker-her2-amplification
  term: HER2 Amplification
  aliases:
  - ERBB2 amplification
  - HER2/neu amplification
  - HER2 overexpression
  - HER2-positive
  category: biomarker
  short_definition: Increased copy number of the ERBB2 gene (encoding HER2/neu receptor
    tyrosine kinase), typically defined as a HER2:CEP17 ratio ≥2.0 or average HER2
    copy number ≥6 signals/cell by FISH, leading to receptor overexpression and constitutive
    pro-proliferative signaling. HER2 amplification and/or protein overexpression
    is a predictive biomarker for HER2-directed therapies.
  clinical_context: HER2 amplification/overexpression occurs in approximately 15–20%
    of breast cancers, 10–15% of gastroesophageal cancers, and is variably present
    in bladder, biliary, and other solid tumors. FDA-approved HER2-directed therapies
    for HER2-positive breast cancer include trastuzumab, pertuzumab, ado-trastuzumab
    emtansine (T-DM1), trastuzumab deruxtecan (T-DXd), lapatinib, neratinib, and tucatinib,
    most requiring companion diagnostic HER2 testing. Trastuzumab and trastuzumab
    deruxtecan are also approved for HER2-positive gastric/gastroesophageal junction
    adenocarcinoma. The FDA recognizes HER2 IHC and FISH as companion diagnostic methods,
    with IHC 3+ or ISH amplification defining positivity.
  typical_values: null
  related_terms:
  - ERBB2
  - HER2 overexpression
  - trastuzumab
  - pertuzumab
  - T-DM1
