    for TRK inhibitors.
  clinical_context: NTRK fusions are rare across common solid tumors (occurring in
    <1% of NSCLC, colorectal, and other common cancers) but are highly prevalent in
    rare tumors such as secretory breast carcinoma, infantile fibrosarcoma (ETV6-NTRK3),
    and salivary gland carcinoma. Larotrectinib (Vitrakvi) and entrectinib (Rozlytrek)
    received FDA tumor-agnostic approvals for NTRK fusion-positive solid tumors, representing
    a tissue-agnostic treatment paradigm. Companion diagnostic testing for NTRK fusions
    is required by FDA labeling for both agents; both IHC and NGS-based assays are
    used, with NGS recommended for confirmation. Second-generation TRK inhibitors
    (e.g., repotrectinib, selitrectinib) are under development for acquired resistance.
