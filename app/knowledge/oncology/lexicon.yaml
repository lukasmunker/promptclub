- id: endpoint-dcr
  term: Disease Control Rate
  aliases:
  - DCR
  category: endpoint
  short_definition: Disease Control Rate is the proportion of patients who achieve
    Complete Response, Partial Response, or Stable Disease lasting at least a pre-specified
    minimum duration. It extends ORR by including patients with durable stable disease.
  clinical_context: DCR is particularly relevant for cytostatic agents and targeted
    therapies where stable disease may be the predominant treatment effect rather
    than tumor shrinkage. The minimum duration threshold for SD (commonly 12 or 16
    weeks) must be pre-specified to distinguish treatment-related stabilization from
    natural disease course. The FDA recognizes DCR as a supportive endpoint but not
    as a standalone basis for approval because the SD component may reflect the natural
    history of slowly progressive tumors. DCR should always be reported alongside
    the duration distribution of the SD component to allow meaningful clinical interpretation.
