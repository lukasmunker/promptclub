- id: drug-class-imid
  term: IMiD
  aliases:
  - immunomodulatory drug
  - immunomodulatory imide drug
  - thalidomide analogue
  category: drug-class
  short_definition: IMiDs (immunomodulatory drugs) are thalidomide derivatives that
    bind cereblon, a component of the CRL4-CRBN E3 ubiquitin ligase complex, redirecting
    ubiquitination to degrade key transcription factors such as Ikaros and Aiolos,
    thereby inducing apoptosis in myeloma and other hematologic tumor cells and modulating
    immune effector function.
  clinical_context: FDA-approved IMiDs in oncology include thalidomide (Thalomid),
    lenalidomide (Revlimid), and pomalidomide (Pomalyst), all used for multiple myeloma
    across multiple lines of therapy, with lenalidomide also approved for myelodysplastic
    syndrome with del(5q) and mantle cell lymphoma. Deep vein thrombosis and pulmonary
    embolism require mandatory thromboprophylaxis; all three agents are strict teratogens
    subject to FDA REMS programs (THALOMID REMS and Revassist). Peripheral neuropathy
    is particularly associated with thalidomide.
