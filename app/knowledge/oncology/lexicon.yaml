- id: treatment-line-first-line
  term: First-Line Therapy
  aliases:
  - 1L
  - front-line therapy
  - initial therapy
  - first-line treatment
  category: treatment-line
  short_definition: The initial systemic treatment regimen administered to a patient
    for a given cancer diagnosis. It represents the standard-of-care or preferred
    treatment chosen based on tumor histology, molecular profile, stage, and patient
    performance status.
  clinical_context: First-line therapy is initiated at the time of diagnosis or upon
    confirmation of advanced/metastatic disease when prior systemic treatment for
    that indication has not been given. Selection is gated by pathologic diagnosis,
    biomarker testing (e.g., EGFR, ALK, PD-L1), and ECOG/Karnofsky performance status.
    Representative examples include carboplatin plus pemetrexed plus pembrolizumab
    as first-line therapy for metastatic non-squamous NSCLC, or R-CHOP for diffuse
    large B-cell lymphoma. Regulatory submissions for first-line indications typically
    require a treatment-naive population or clearly defined prior-therapy exclusion
    criteria.
