- id: resistance-mechanism-egfr-t790m
  term: Acquired EGFR T790M mutation
  aliases:
  - T790M
  - EGFR T790M
  - gatekeeper T790M mutation
  category: resistance-mechanism
  short_definition: A point mutation in exon 20 of the EGFR gene (threonine-to-methionine
    substitution at codon 790) that emerges under selective pressure of first- or
    second-generation EGFR tyrosine kinase inhibitors. It is the most common mechanism
    of acquired resistance to erlotinib, gefitinib, and afatinib in EGFR-mutant non-small-cell
    lung cancer.
  clinical_context: T790M is detected in approximately 50–60% of EGFR-mutant NSCLC
    patients who progress after first- or second-generation EGFR TKI therapy. Detection
    relies on rebiopsy of progressive lesions or, increasingly, plasma cell-free DNA
    (liquid biopsy) assays. The third-generation EGFR TKI osimertinib was specifically
    developed to overcome T790M-mediated resistance and is the approved standard of
    care in this setting. Osimertinib is now also used in the first-line setting,
    after which distinct resistance mechanisms (C797S, MET amplification) predominate.
  typical_values: null
