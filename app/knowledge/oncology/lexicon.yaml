entries:
- id: biomarker-alk-rearrangement
  term: ALK Rearrangement
  aliases:
  - ALK fusion
  - ALK translocation
  - Anaplastic Lymphoma Kinase rearrangement
  - ALK gene fusion
  category: biomarker
  short_definition: Chromosomal rearrangements involving the ALK gene, most commonly
    an inversion on chromosome 2p that fuses ALK with the EML4 gene, producing a constitutively
    active fusion kinase. This oncogenic driver is a predictive biomarker for response
    to ALK tyrosine kinase inhibitors.
  clinical_context: ALK rearrangements are present in approximately 3–5% of NSCLC,
    predominantly in adenocarcinoma, and are enriched in younger, never- or light-smokers.
    FDA-approved ALK inhibitors that require companion diagnostic testing include
    crizotinib, ceritinib, alectinib, brigatinib, and lorlatinib. ALK FISH, IHC, and
    next-generation sequencing (NGS) assays are FDA-approved companion diagnostics
    for multiple ALK inhibitors. Lorlatinib is approved for ALK-positive NSCLC including
    tumors with acquired resistance mutations.
  typical_values: null
  related_terms:
  - EML4-ALK
  - ALK inhibitor
  - crizotinib
  - alectinib
  - lorlatinib
  - NSCLC
  sources:
