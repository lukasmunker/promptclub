  short_definition: Selective estrogen receptor modulators (SERMs) are compounds that
    bind the estrogen receptor and exert tissue-selective agonist or antagonist activity,
    acting as ER antagonists in breast tissue to inhibit estrogen-driven tumor cell
    proliferation while exhibiting agonist effects in other tissues.
  clinical_context: Tamoxifen is the prototypical FDA-approved SERM used for the treatment
    and risk reduction of hormone receptor-positive breast cancer across pre- and
    postmenopausal women, including adjuvant therapy in early-stage and treatment
    of advanced disease. Toremifene (Fareston) is an approved alternative for postmenopausal
