    inhibiting B-cell proliferation, survival, and homing in B-cell malignancies.
  clinical_context: BTK inhibitors are approved for B-cell malignancies including
    chronic lymphocytic leukemia (CLL), mantle cell lymphoma, Waldenstrom's macroglobulinemia,
