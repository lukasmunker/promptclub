  term: Phase 0
  aliases:
  - phase 0 trial
  - first-in-human exploratory study
  - exploratory IND study
  category: trial-phase
  short_definition: A Phase 0 trial is an optional, exploratory first-in-human study
    that uses subtherapeutic doses in a small number of subjects to obtain early pharmacokinetic
    and pharmacodynamic data about an investigational agent.
  clinical_context: Phase 0 studies are conducted under an exploratory Investigational
    New Drug (IND) application and typically enroll 10–15 subjects. Doses are intentionally
    below those expected to produce pharmacologic effects, so there is no therapeutic
    intent. These studies are designed to inform the decision of whether to proceed
    to Phase 1 by providing early human PK/PD data. FDA issued specific guidance on
    exploratory IND studies in 2006 to clarify the regulatory framework for this phase.
