- id: biomarker-jak2-v617f
  term: JAK2 V617F
  aliases:
  - JAK2 Val617Phe
  - JAK2 p.Val617Phe
  - JAK2 exon 14 mutation
  category: biomarker
  short_definition: A somatic point mutation in exon 14 of the Janus Kinase 2 (JAK2)
    gene resulting in substitution of valine by phenylalanine at codon 617 (V617F),
    causing constitutive activation of JAK2 kinase and downstream STAT signaling independent
    of normal cytokine receptor input. JAK2 V617F is a diagnostic and predictive biomarker
    in myeloproliferative neoplasms.
  clinical_context: JAK2 V617F is present in approximately 95% of polycythemia vera
    (PV), 50–60% of essential thrombocythemia (ET), and 50–60% of primary myelofibrosis
    (PMF), and its detection is a major criterion in WHO diagnostic criteria for these
    myeloproliferative neoplasms. Ruxolitinib (Jakafi) is FDA-approved for intermediate-
    or high-risk myelofibrosis (including JAK2 V617F-positive and -negative disease)
    and for PV inadequately controlled by hydroxyurea; fedratinib, pacritinib, and
    momelotinib are additional FDA-approved JAK inhibitors for myelofibrosis. While
    JAK inhibitor approval does not strictly require JAK2 V617F positivity (as JAK2
    exon 12, CALR, and MPL mutations also occur), JAK2 V617F testing is a diagnostic
    cornerstone.
  typical_values: null
  related_terms:
  - JAK-STAT pathway
  - myeloproliferative neoplasm
  - polycythemia vera
  - myelofibrosis
  - essential thrombocythemia
  - ruxolitinib
  - CALR mutation
