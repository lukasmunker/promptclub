  category: drug-class
  short_definition: Immune checkpoint inhibitors are monoclonal antibodies that block
    inhibitory receptors or their ligands on T cells or tumor cells, thereby restoring
    antitumor immune responses. They encompass agents targeting PD-1, PD-L1, CTLA-4,
    and other co-inhibitory pathways.
  clinical_context: ICIs are approved across a broad range of solid and hematologic
    malignancies, including non-small cell lung cancer, melanoma, urothelial carcinoma,
    and hepatocellular carcinoma. Representative approved agents include pembrolizumab
    (Keytruda, anti-PD-1) and ipilimumab (Yervoy, anti-CTLA-4). Clinical use is guided
    by predictive biomarkers such as PD-L1 expression, tumor mutational burden, and
    mismatch repair deficiency. Immune-related adverse events affecting any organ
