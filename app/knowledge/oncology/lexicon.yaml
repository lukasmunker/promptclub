- id: biomarker-brca1-mutation
  term: BRCA1 Mutation
  aliases:
  - BRCA1 variant
  - BRCA1 pathogenic variant
  - germline BRCA1
  - somatic BRCA1
  category: biomarker
  short_definition: Pathogenic germline or somatic mutations in the BRCA1 tumor suppressor
    gene, which encodes a protein essential for homologous recombination DNA repair,
    resulting in defective double-strand break repair and increased genomic instability.
    BRCA1 mutation status is a predictive biomarker for response to PARP inhibitors
    and platinum-based chemotherapy.
  clinical_context: Germline BRCA1 mutations confer high lifetime risks of breast
    (up to 72%) and ovarian (up to 44%) cancer, and elevated risks of pancreatic and
    prostate cancer. FDA-approved PARP inhibitors (olaparib, niraparib, rucaparib,
    talazoparib) require BRCA1/2 mutation testing as companion diagnostics for their
    respective breast, ovarian, prostate, and pancreatic cancer indications. Olaparib
    and niraparib are approved for germline BRCA1/2-mutated HER2-negative breast cancer;
    olaparib is approved for germline BRCA1/2-mutated metastatic prostate and pancreatic
    cancers. Somatic BRCA1 mutations are also actionable in ovarian cancer with FDA-approved
    PARP inhibitors.
  typical_values: null
  related_terms:
  - BRCA2 mutation
  - PARP inhibitor
  - olaparib
  - niraparib
  - talazoparib
  - homologous recombination deficiency
  - HRD
  - hereditary breast and ovarian cancer
  sources:
