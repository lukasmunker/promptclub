- id: tumor-type-her2-positive-breast-cancer
  term: HER2-Positive Breast Cancer
  aliases:
  - HER2+ BC
  - HER2+ breast cancer
  - HER2-amplified breast cancer
  - HER2-overexpressing breast cancer
  category: tumor-type
  short_definition: HER2-positive breast cancer is defined by overexpression of the
    HER2 protein (3+ by IHC) or amplification of the ERBB2 gene (by ISH), affecting
    approximately 15-20% of all breast cancers. This subtype is associated with aggressive
    tumor behavior but is highly responsive to HER2-directed therapies.
  clinical_context: Standard-of-care in early HER2-positive breast cancer includes
    trastuzumab and pertuzumab combined with chemotherapy in the neoadjuvant and adjuvant
    settings; ado-trastuzumab emtansine (T-DM1) is used adjuvantly for residual disease.
    In metastatic disease, first-line treatment is pertuzumab plus trastuzumab plus
    taxane; trastuzumab deruxtecan (T-DXd) has demonstrated superior efficacy in later
    lines. HER2 testing (IHC and ISH) is mandatory for all newly diagnosed invasive
    breast cancers.
