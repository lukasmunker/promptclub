- id: biomarker-idh1-mutation
  term: IDH1 Mutation
  aliases:
  - IDH1 R132H
  - IDH1 R132C
  - Isocitrate Dehydrogenase 1 mutation
  - IDH1 hotspot mutation
  category: biomarker
  short_definition: Somatic gain-of-function mutations in the IDH1 gene, predominantly
    at codon 132 (most commonly R132H), conferring neomorphic enzymatic activity that
    converts alpha-ketoglutarate to the oncometabolite 2-hydroxyglutarate (2-HG),
    leading to epigenetic dysregulation and impaired cellular differentiation. IDH1
    mutation is a diagnostic and predictive biomarker in glioma and acute myeloid
    leukemia.
  clinical_context: IDH1 mutations are present in approximately 70–80% of WHO Grade
    2–3 diffuse gliomas and secondary glioblastoma, where they define a favorable
    prognostic molecular subtype, and in approximately 6–10% of acute myeloid leukemia
    (AML). Ivosidenib (Tibsovo), an IDH1 inhibitor, is FDA-approved for IDH1-mutated
    AML (newly diagnosed and relapsed/refractory) and IDH1-mutated cholangiocarcinoma;
    olutasidenib is FDA-approved for relapsed/refractory IDH1-mutated AML. FDA-recognized
    companion diagnostics are required for ivosidenib and olutasidenib. IDH1 mutation
    testing is also a required component of WHO 2021 glioma classification.
  typical_values: null
  related_terms:
  - IDH2 mutation
  - 2-hydroxyglutarate
  - ivosidenib
  - olutasidenib
  - AML
  - glioma
  - cholangiocarcinoma
  - oncometabolite
