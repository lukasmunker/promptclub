- id: treatment-line-induction
  term: Induction Therapy
  aliases:
  - induction treatment
  - induction chemotherapy
  - induction phase
  - remission induction therapy
  category: treatment-line
  short_definition: Intensive initial systemic treatment designed to rapidly reduce
    tumor burden and achieve remission or the maximal response required before proceeding
    to subsequent treatment phases. It is the first treatment phase in multi-phase
    strategies, particularly in hematologic malignancies.
  clinical_context: Induction therapy is initiated at diagnosis or at the start of
    a new treatment strategy and is gated by confirmed diagnosis, adequate organ function,
    and performance status sufficient for intensive treatment. In acute leukemia,
    standard induction (e.g., cytarabine plus daunorubicin '7+3' regimen in AML) aims
    to achieve complete remission within one to two cycles, after which bone marrow
    is reassessed. In solid tumor and myeloma contexts, 'induction' refers to the
    initial multi-cycle treatment phase preceding autologous stem cell transplantation
    or surgery. The term is also used in the neoadjuvant setting for head and neck
    cancers (e.g., induction TPF — docetaxel, cisplatin, fluorouracil — before chemoradiation).
    Response assessment after induction determines eligibility for consolidation or
    maintenance.
