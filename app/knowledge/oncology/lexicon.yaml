- id: study-design-single-arm
  term: Single-Arm Trial
  aliases:
  - Single-Arm Study
  - Non-Comparative Trial
  - Uncontrolled Trial
  category: study-design
  short_definition: A clinical trial in which all enrolled participants receive the
    experimental intervention, with no concurrent control group. Outcomes are typically
    compared against external or historical benchmarks.
  clinical_context: Single-arm trials are frequently used in early-phase oncology
    development (Phase I/II) and in settings where a concurrent control is ethically
    or practically infeasible. They are a common basis for FDA accelerated approval
    in oncology when the response rate or other endpoint shows a substantial effect
    over historical response rates. Absence of a concurrent control limits the ability
    to attribute outcomes to the treatment alone, and results are susceptible to patient
    selection bias.
  typical_values: null
