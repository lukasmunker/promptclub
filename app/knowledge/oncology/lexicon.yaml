- id: endpoint-dor
  term: Duration of Response
  aliases:
  - DoR
  - DOR
  category: endpoint
  short_definition: Duration of Response is the time from first documented objective
    response (CR or PR) until disease progression or death in responders, providing
    a measure of response durability complementary to ORR.
  clinical_context: DoR is measured only in the subset of patients who achieve an
    objective response and is therefore not an independent endpoint applicable to
    the full trial population. The FDA considers DoR an important complement to ORR
    because a high response rate with short DoR may not represent meaningful clinical
    benefit. DoR is typically reported as a Kaplan-Meier estimate with median and
    confidence intervals in the responding population. Pre-specification of the response-confirmation
    requirement and progression criteria is essential for consistent DoR measurement.
  typical_values: null
