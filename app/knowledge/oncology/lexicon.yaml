  - Overarching Protocol
  category: study-design
  short_definition: A single overarching protocol framework that governs multiple
    concurrent sub-studies, each potentially evaluating different investigational
    treatments or patient populations, under a shared infrastructure of eligibility
    screening, randomization, and data collection.
  clinical_context: Master protocols encompass basket, umbrella, and platform trial
    designs and are specifically addressed in FDA guidance for oncology drug development.
    They allow centralized biomarker screening and a shared master informed consent,
    reducing administrative burden for patients and sites. Master protocols require
    prospective specification of the operating characteristics of each sub-study,
    data sharing rules among sub-studies, and how the master protocol relates to individual
    INDs or a single overarching IND. The FDA recommends early engagement through
    Type B pre-IND meetings to align on statistical analysis plans, sub-study-level
    stopping rules, and multiplicity control strategies.
