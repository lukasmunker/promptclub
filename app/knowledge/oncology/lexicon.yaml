- id: endpoint-orr
  term: Objective Response Rate
  aliases:
  - ORR
  - Overall Response Rate
  category: endpoint
  short_definition: Objective Response Rate is the proportion of patients with a pre-defined
    reduction in tumor burden—complete response plus partial response—maintained for
    a minimum duration. It is used as a primary endpoint in single-arm trials and
    as a secondary endpoint in randomized studies.
  clinical_context: ORR is a direct measure of drug pharmacological activity attributable
    to the drug rather than to natural history, and is therefore particularly useful
    in early-phase trials and single-arm accelerated-approval applications. The FDA
    notes that ORR does not capture disease stabilization and may not correlate with
    OS in all settings; a robust ORR must be accompanied by a meaningful duration
    of response to support approval. Response must be assessed against pre-specified
    criteria (typically RECIST 1.1 or disease-specific guidelines) by blinded independent
    central review when used as a primary endpoint. In single-arm trials, a historically
    derived threshold or pre-specified clinically meaningful benchmark is required
    for interpretation.
