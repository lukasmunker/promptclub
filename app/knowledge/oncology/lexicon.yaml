  category: drug-class
  short_definition: MEK inhibitors are small molecules that allosterically block MEK1
    and MEK2 (MAP2K1/2), non-receptor kinases in the RAS-RAF-MEK-ERK MAPK signaling
    cascade, suppressing tumor cell proliferation driven by upstream BRAF or RAS activation.
  clinical_context: FDA-approved MEK inhibitors are predominantly used in combination
    with BRAF inhibitors for BRAF V600E/K-mutant melanoma, including trametinib plus
    dabrafenib (Mekinist/Tafinlar) and cobimetinib plus vemurafenib (Cotellic/Zelboraf),
    with additional approvals in BRAF-mutant NSCLC and thyroid cancer. Combined BRAF/MEK
    inhibition reduces the occurrence of paradoxical MAPK pathway activation and cutaneous
    squamous cell carcinoma seen with BRAF inhibitor monotherapy. Ocular toxicity
    (uveitis, retinal pigment epitheliopathy), skin rash, and cardiac toxicity are
    recognized class effects.
