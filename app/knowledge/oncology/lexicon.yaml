  category: biomarker
  short_definition: Loss of protein expression or function of one or more mismatch
    repair (MMR) proteins—MLH1, MSH2, MSH6, or PMS2—detected by immunohistochemistry,
    resulting in impaired correction of DNA replication errors and a hypermutator
    phenotype equivalent to MSI-H. dMMR is a pan-tumor predictive biomarker for PD-1
    blockade.
  clinical_context: MMR deficiency is detected by IHC showing absence of staining
    for one or more MMR proteins and is functionally equivalent to MSI-H status by
    PCR; the two tests are used interchangeably in clinical practice and regulatory
    labeling. Pembrolizumab is FDA-approved for dMMR solid tumors regardless of tumor
    type, and dostarlimab is approved for dMMR endometrial cancer and other dMMR solid
    tumors. dMMR in colorectal cancer is also prognostic (favorable in Stage II, unfavorable
    predictive marker for 5-FU monotherapy benefit). Germline MMR mutations underlie
    Lynch syndrome, the most common hereditary colorectal cancer syndrome.
