- id: response-criterion-irecist
  term: iRECIST
  aliases:
  - Immune-Related RECIST
  - Immunotherapy RECIST
  category: response-criterion
  short_definition: iRECIST is a modified version of RECIST 1.1 designed for use in
    immunotherapy trials, introducing the concept of unconfirmed progressive disease
    (iUPD) to accommodate atypical immune-mediated response patterns such as pseudoprogression.
    Confirmation of progression requires a subsequent scan demonstrating further growth
    before a patient is classified as having confirmed progressive disease (iCPD).
  clinical_context: iRECIST was developed to address the limitations of RECIST 1.1
    when evaluating responses to immune checkpoint inhibitors and other immunotherapies,
    where initial apparent progression may precede a durable response (pseudoprogression).
    It is primarily applied in solid tumor trials involving PD-1, PD-L1, and CTLA-4
    inhibitors. The criteria allow continued treatment beyond initial radiological
    progression, provided the patient is clinically stable, with mandatory confirmation
    of progression at a subsequent imaging time point. iRECIST is increasingly recommended
    by regulatory guidance documents for immunotherapy efficacy trials.
