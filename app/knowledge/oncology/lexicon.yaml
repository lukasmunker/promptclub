  term: Glioblastoma
  aliases:
  - GBM
  - glioblastoma multiforme
  - WHO Grade 4 glioma
  - IDH-wildtype glioblastoma
  category: tumor-type
  short_definition: Glioblastoma is the most common and most malignant primary brain
    tumor in adults, classified as WHO Grade 4 diffuse glioma, most frequently IDH-wildtype.
    Median survival with standard treatment is approximately 14-16 months.
  clinical_context: GBM is rare overall (incidence approximately 3-4 per 100,000 per
    year) but is the most common malignant primary brain tumor in adults, typically
    presenting with headache, seizures, or focal neurologic deficits. Standard-of-care
    is maximal safe surgical resection followed by concurrent temozolomide and radiotherapy
    (Stupp protocol), then adjuvant temozolomide; MGMT promoter methylation status
    predicts benefit from temozolomide. Tumor treating fields (TTFields) with maintenance
    temozolomide is an approved option; prognosis remains poor despite treatment.
