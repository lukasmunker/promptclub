- id: endpoint-efs
  term: Event-Free Survival
  aliases:
  - EFS
  category: endpoint
  short_definition: Event-Free Survival is the time from randomization until any pre-specified
    event, which may include disease progression, treatment discontinuation for toxicity,
    secondary malignancy, or death. The precise definition of 'event' varies by protocol.
  clinical_context: EFS is particularly common in pediatric oncology and hematologic
    malignancy trials, where multiple clinically meaningful failure modes must be
    captured alongside disease progression. The composite nature of EFS means that
    the components must be clearly enumerated in the statistical analysis plan to
    allow meaningful interpretation. The FDA recognizes EFS as an endpoint that can
    support approval when events are clinically meaningful and the treatment effect
    is robust. Sensitivity analyses exploring individual event components are recommended
    to understand the driver of any observed effect.
