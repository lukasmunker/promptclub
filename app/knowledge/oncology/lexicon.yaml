- id: biomarker-brca2-mutation
  term: BRCA2 Mutation
  aliases:
  - BRCA2 variant
  - BRCA2 pathogenic variant
  - germline BRCA2
  - somatic BRCA2
  category: biomarker
  short_definition: Pathogenic germline or somatic mutations in the BRCA2 tumor suppressor
    gene, which encodes a critical mediator of homologous recombination DNA repair,
    impairing the cell's ability to accurately repair double-strand DNA breaks. BRCA2
    mutation is a predictive biomarker for PARP inhibitors and platinum chemotherapy
    across multiple cancer types.
  clinical_context: Germline BRCA2 mutations confer elevated lifetime risks of breast
    (up to 69%), ovarian (up to 17%), prostate, and pancreatic cancers. BRCA2 mutation
    testing is an FDA companion diagnostic requirement for olaparib (breast, ovarian,
    prostate, pancreatic cancer), niraparib (ovarian cancer), rucaparib (ovarian and
    prostate cancer), and talazoparib (breast cancer). Germline BRCA2 mutations in
    metastatic castration-resistant prostate cancer predict response to olaparib and
    rucaparib. As with BRCA1, somatic BRCA2 mutations also predict PARP inhibitor
    benefit, particularly in ovarian cancer.
  typical_values: null
  related_terms:
  - BRCA1 mutation
  - PARP inhibitor
  - olaparib
  - niraparib
  - rucaparib
  - talazoparib
  - HRD
  - prostate cancer
  - ovarian cancer
