- id: resistance-mechanism-esr1-mutation
  term: ESR1 mutation
  aliases:
  - ESR1 ligand-binding domain mutation
  - estrogen receptor 1 mutation
  - ESR1 LBD mutation
  category: resistance-mechanism
  short_definition: Somatic mutations in the ligand-binding domain of the estrogen
    receptor alpha gene (ESR1), most commonly at codons Y537 and D538, that produce
    ligand-independent receptor activation and confer resistance to aromatase inhibitors
    in estrogen receptor-positive breast cancer. These mutations are acquired under
    the selective pressure of estrogen deprivation.
  clinical_context: ESR1 LBD mutations are detected in 10–40% of ER-positive, HER2-negative
    metastatic breast cancer patients progressing on aromatase inhibitor therapy and
    are rare in treatment-naive tumors, confirming their acquired nature. Detection
    is performed via liquid biopsy (circulating tumor DNA) or tumor tissue next-generation
    sequencing at progression. Selective estrogen receptor degraders (SERDs) such
    as elacestrant, which received FDA approval for ESR1-mutated ER+/HER2- metastatic
    breast cancer, are specifically indicated in this setting. ESR1 mutations may
    also reduce sensitivity to fulvestrant, underscoring the importance of mutation-specific
    characterization.
