  category: study-design
  short_definition: A clinical trial design in which patients are prospectively classified
    by a biomarker and either stratified at randomization or selectively enrolled
    (enriched) to evaluate whether treatment benefit differs by biomarker status.
  clinical_context: Biomarker-stratified designs range from all-comers trials with
    biomarker stratification factors to enrichment designs that restrict enrollment
    to biomarker-positive patients. The FDA Enrichment Strategies guidance categorizes
    approaches as prognostic enrichment (selecting patients more likely to have an
    event) or predictive enrichment (selecting patients more likely to respond to
    treatment). In oncology, predictive enrichment based on companion diagnostic biomarkers
    (e.g., HER2 overexpression, PD-L1 expression, EGFR mutation) is a cornerstone
    of precision medicine drug development. Statistical analysis plans for stratified
    designs must pre-specify subgroup analyses and interaction tests to avoid data-dredging.
