    in combination with androgen deprivation therapy. Abiraterone acetate (Zytiga),
    a CYP17A1 inhibitor that reduces androgen biosynthesis, is approved in combination
    with prednisone for metastatic castration-resistant prostate cancer. Fatigue,
    hot flashes, and falls/fractures are recognized class effects; enzalutamide also
    carries a seizure risk.
