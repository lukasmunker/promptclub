- id: biomarker-flt3-mutation
  term: FLT3 Mutation
  aliases:
  - FLT3-ITD
  - FLT3 internal tandem duplication
  - FLT3-TKD
  - FLT3 D835
  - FMS-like tyrosine kinase 3 mutation
  category: biomarker
  short_definition: Activating mutations in the FLT3 receptor tyrosine kinase gene,
    most commonly internal tandem duplications (ITD) in the juxtamembrane domain or
    point mutations in the tyrosine kinase domain (TKD, e.g., D835Y), that drive autonomous
    FLT3 kinase signaling and promote leukemic cell proliferation and survival. FLT3
    mutations are diagnostic and predictive biomarkers in AML.
  clinical_context: FLT3-ITD mutations occur in approximately 25–30% of AML and FLT3-TKD
    mutations in approximately 5–10%; FLT3-ITD confers an adverse prognosis, particularly
    with high allelic ratio. Midostaurin (Rydapt) is FDA-approved in combination with
    standard induction chemotherapy for newly diagnosed FLT3-mutated AML; quizartinib
    (Vanflyta) is approved for newly diagnosed FLT3-ITD-positive AML; and gilteritinib
    (Xospata) is approved for relapsed/refractory FLT3-mutated AML. FDA-approved companion
    diagnostics are required for midostaurin, quizartinib, and gilteritinib. FLT3
    mutation status is re-tested at relapse because allelic dynamics can change.
  typical_values: null
  related_terms:
  - FLT3-ITD
  - FLT3-TKD
  - midostaurin
  - gilteritinib
  - quizartinib
  - AML
  - leukemia
