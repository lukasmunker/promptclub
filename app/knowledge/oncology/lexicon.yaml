  term: Cervical Cancer
  aliases:
  - cervical carcinoma
  - carcinoma of the cervix
  - invasive cervical cancer
  category: tumor-type
  short_definition: Cervical cancer is a malignant neoplasm arising from the cervical
    epithelium, with squamous cell carcinoma and adenocarcinoma as the predominant
    histologic subtypes. Persistent infection with high-risk human papillomavirus
    (HPV), particularly HPV 16 and 18, is the primary etiologic factor.
  clinical_context: Cervical cancer is the fourth most common cancer in women globally
    and predominantly affects women in low- and middle-income countries, where access
    to HPV vaccination and cervical cytology screening is limited. Locally advanced
    disease (stage IB2-IVA) is treated with concurrent cisplatin-based chemoradiotherapy
    followed by brachytherapy; bevacizumab was the first agent to improve survival
    in recurrent/metastatic cervical cancer. Pembrolizumab combined with bevacizumab
    plus chemotherapy is approved as first-line treatment for PD-L1-positive (CPS
    ≥1) recurrent/metastatic disease.
