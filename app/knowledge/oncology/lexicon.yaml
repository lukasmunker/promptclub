  - AR antagonist
  category: drug-class
  short_definition: Androgen receptor inhibitors are agents that block androgen receptor
    (AR) signaling, either by directly antagonizing ligand binding to the AR, inhibiting
    CYP17A1-mediated androgen biosynthesis, or degrading the AR protein, thereby suppressing
    androgen-driven transcription and tumor cell growth in prostate cancer.
  clinical_context: FDA-approved AR inhibitors include enzalutamide (Xtandi), apalutamide
    (Erleada), and darolutamide (Nubeqa) as second-generation AR antagonists used
