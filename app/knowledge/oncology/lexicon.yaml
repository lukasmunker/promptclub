- id: tumor-type-prostate-cancer
  term: Prostate Cancer
  aliases:
  - prostatic carcinoma
  - carcinoma of the prostate
  - prostate adenocarcinoma
  category: tumor-type
  short_definition: Prostate cancer is a malignant neoplasm arising from the glandular
    epithelium of the prostate and is the most commonly diagnosed cancer in men in
    Western countries. The majority of cases are acinar adenocarcinomas.
  clinical_context: Prostate cancer presents across a wide spectrum, from indolent
    localized disease managed by active surveillance to aggressive metastatic disease.
    PSA testing and digital rectal exam are used for screening, though screening recommendations
    vary by guidelines. Treatment of localized disease includes active surveillance,
    radical prostatectomy, or radiation therapy; advanced disease management includes
    androgen deprivation therapy (ADT) with or without androgen receptor pathway inhibitors
    (enzalutamide, abiraterone, apalutamide, darolutamide), chemotherapy, or PARP
    inhibitors in BRCA-mutated disease.
