  - Immune Related Response Criteria
  category: response-criterion
  short_definition: The irRC (Immune-Related Response Criteria) are a set of response
    assessment criteria developed specifically for ipilimumab and other immunotherapies,
    using bidimensional tumor burden measurements and requiring confirmation of progression
    to accommodate delayed or atypical immune responses. Unlike standard RECIST, irRC
    permits the appearance of new lesions while still allowing classification of overall
    response as non-progressive if total tumor burden does not increase sufficiently.
  clinical_context: irRC were originally developed from analyses of ipilimumab (anti-CTLA-4)
    trial data, where a subset of patients appeared to progress before achieving a
    subsequent durable response, a pattern not captured by conventional RECIST. The
    criteria use the WHO bidimensional method (product of longest diameter and perpendicular
    diameter) summed across index and new measurable lesions. irRC are applied primarily
    in melanoma and other solid tumors treated with immunotherapies where atypical
    response kinetics are expected. They preceded iRECIST and informed the development
    of later immune-specific response frameworks.
