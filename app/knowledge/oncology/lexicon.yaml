- id: treatment-line-second-line
  term: Second-Line Therapy
  aliases:
  - 2L
  - second-line treatment
  - 2nd-line therapy
  category: treatment-line
  short_definition: A systemic treatment regimen given after documented failure, intolerance,
    or progression on one prior line of therapy. It is the next prescribed treatment
    course following first-line therapy.
  clinical_context: Second-line therapy is initiated when the first-line regimen is
    discontinued due to disease progression (typically confirmed by radiographic criteria
    such as RECIST 1.1), unacceptable toxicity, or patient preference. Eligibility
    is gated by documentation of exactly one prior systemic therapy for the relevant
    indication. A well-known example is docetaxel or ramucirumab plus docetaxel as
    second-line therapy for metastatic NSCLC after platinum-based chemotherapy. In
    regulatory contexts, the definition of 'one prior line' must be pre-specified,
    including whether maintenance continuation of a first-line agent counts as a separate
    line.
