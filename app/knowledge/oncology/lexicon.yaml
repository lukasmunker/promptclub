- id: response-criterion-choi
  term: Choi Criteria
  aliases:
  - Choi Response Criteria
  - CT Density Criteria for GIST
  category: response-criterion
  short_definition: The Choi Criteria are imaging-based response assessment criteria
    developed for gastrointestinal stromal tumors (GIST) treated with imatinib, incorporating
    both tumor size (decrease ≥10% in longest diameter) and CT attenuation (decrease
    ≥15% in Hounsfield units) to capture functional responses that may not be apparent
    by size change alone. This addresses the limitation of RECIST, which can underestimate
    response in GIST where tumors may decrease in density but not substantially in
    size.
  clinical_context: Choi Criteria were specifically designed for GIST treated with
    tyrosine kinase inhibitors such as imatinib and sunitinib, where effective therapy
    often results in myxoid degeneration and decreased tumor density on CT before
    significant size reduction occurs. The criteria have improved sensitivity for
    detecting response compared to RECIST and correlate better with time-to-progression
    and survival in GIST. They are used in GIST clinical trials and specialty oncology
    practice, though regulatory use of Choi Criteria as a primary endpoint requires
    prospective validation and agreement with agencies. The criteria highlight the
    importance of incorporating functional imaging metrics alongside morphological
    measurements.
  typical_values: null
