  category: drug-class
  short_definition: Antibody-drug conjugates are biopharmaceuticals composed of a
    tumor-targeting monoclonal antibody linked via a chemical linker to a cytotoxic
    payload, enabling selective delivery of potent cytotoxins to antigen-expressing
    tumor cells while sparing normal tissue.
  clinical_context: FDA-approved ADCs include ado-trastuzumab emtansine (Kadcyla)
    and trastuzumab deruxtecan (Enhertu) targeting HER2 in breast and gastric cancers,
    sacituzumab govitecan (Trodelvy) targeting TROP-2 in triple-negative breast and
    urothelial cancers, and brentuximab vedotin (Adcetris) targeting CD30 in Hodgkin
    and T-cell lymphomas. Linker stability, payload bystander effect, and target antigen
    selection are key design determinants of efficacy and tolerability. Interstitial
    lung disease/pneumonitis is an emerging class-specific concern for topoisomerase
    I inhibitor payloads.
