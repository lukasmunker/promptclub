- id: endpoint-cbr
  term: Clinical Benefit Rate
  aliases:
  - CBR
  category: endpoint
  short_definition: Clinical Benefit Rate is the proportion of patients with Complete
    Response, Partial Response, or durable Stable Disease, sometimes defined to also
    include minor responses, and is used to capture the totality of patients deriving
    meaningful benefit from treatment.
  clinical_context: CBR overlaps substantially with DCR but may differ in its inclusion
    of minor response categories or a different minimum duration threshold for SD,
    depending on disease area conventions; breast cancer trials, for example, have
    used CBR to include minor responders. The FDA guidance discusses CBR in the context
    of endpoints that capture disease stabilization alongside objective responses,
    noting the importance of pre-specifying the criteria rigorously. Because CBR encompasses
    heterogeneous response categories, sponsor-specific definitions must be transparently
    reported to allow cross-trial comparisons. CBR is generally considered a supportive
    rather than primary regulatory endpoint.
