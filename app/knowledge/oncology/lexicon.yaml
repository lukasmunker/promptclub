- id: trial-phase-1-2
  term: Phase 1/2
  aliases:
  - phase I/II
  - phase 1/phase 2
  - phase i/ii trial
  category: trial-phase
  short_definition: A Phase 1/2 trial is a combined study design that integrates dose-finding
    (Phase 1) and preliminary efficacy evaluation (Phase 2) within a single protocol,
    often using a seamless or adaptive design.
  clinical_context: In oncology, Phase 1/2 trials allow an investigational agent to
    transition from dose escalation to expansion cohorts evaluating efficacy without
    requiring a separate protocol. This design is common in early-stage oncology drug
    development, particularly for targeted therapies and immunotherapies, where the
    optimal biologic dose may differ from the maximum tolerated dose. The design can
