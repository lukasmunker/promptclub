- id: response-criterion-recist-1-1
  term: RECIST 1.1
  aliases:
  - RECIST
  - Response Evaluation Criteria in Solid Tumors 1.1
  category: response-criterion
  short_definition: RECIST 1.1 is a standardized, imaging-based framework for measuring
    tumor response in solid tumors, defining objective categories of Complete Response
    (CR), Partial Response (PR), Stable Disease (SD), and Progressive Disease (PD).
    It updated the original RECIST guidelines by reducing the maximum number of target
    lesions, incorporating lymph node assessment, and clarifying pathological complete
    response criteria.
  clinical_context: RECIST 1.1 is the predominant response criterion used in oncology
    clinical trials across a broad range of solid tumor types, including lung, breast,
    colorectal, and many others. It relies on unidimensional (longest diameter) measurements
    of up to 5 target lesions per patient on cross-sectional imaging (CT or MRI).
    Its standardized definitions of response and progression enable cross-trial comparability
    and serve as the regulatory standard for endpoints such as objective response
    rate (ORR) and progression-free survival (PFS). Regulatory agencies including
    the FDA and EMA accept RECIST 1.1 as the reference method for imaging-based efficacy
    assessment in solid tumor trials.
