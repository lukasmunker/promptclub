  term: Double-Blind Trial
  aliases:
  - Double-Blinded Trial
  - Double-Masked Trial
  category: study-design
  short_definition: A clinical trial in which neither the participant nor the treating
    investigator knows the treatment assignment, achieved through identical-appearing
    active and placebo preparations. Blinding is maintained until a pre-specified
    unblinding event (e.g., database lock or interim analysis).
  clinical_context: Double-blinding is the preferred design for trials with subjective
    endpoints (e.g., pain, patient-reported outcomes, progression-free survival based
    on investigator assessment) to eliminate ascertainment and performance bias. In
    oncology, double-blind placebo-controlled trials are feasible when an oral agent
    can be matched by a placebo and when background standard of care is uniform. Maintenance
    of the blind is monitored throughout the trial and emergency unblinding procedures
    are pre-specified for safety events.
