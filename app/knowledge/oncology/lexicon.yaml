- id: resistance-mechanism-loss-of-mhc-class-i
  term: Loss of MHC class I
  aliases:
  - MHC class I downregulation
  - HLA loss
  - HLA class I loss
  - beta-2 microglobulin loss
  - B2M loss
  category: resistance-mechanism
  short_definition: Downregulation or complete loss of major histocompatibility complex
    (MHC) class I molecules on the tumor cell surface, impairing antigen presentation
    to cytotoxic CD8+ T cells and enabling immune escape from T cell-mediated killing.
    This constitutes a primary and acquired mechanism of resistance to immune checkpoint
    inhibitor therapy.
  clinical_context: Loss of MHC class I expression is identified in a subset of tumors
    progressing on PD-1/PD-L1 checkpoint inhibitor therapy and can occur through mutations
    in B2M, HLA genes, or components of the antigen processing machinery, detectable
    by immunohistochemistry or next-generation sequencing on re-biopsy. Because cytotoxic
    T cell recognition depends on MHC class I-peptide complexes, loss of MHC class
    I renders tumors invisible to CD8+ T cells even when T cell function is otherwise
    restored by checkpoint blockade. There is currently no approved targeted therapy
    that directly overcomes MHC class I loss; strategies under investigation include
    NK cell-based therapies, which do not require MHC class I for target recognition.
    This mechanism has been described in melanoma, lung cancer, and other tumor types
    treated with anti-PD-1 agents.
