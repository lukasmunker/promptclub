  - MET splice site mutation
  category: biomarker
  short_definition: Genomic alterations (splice-site mutations, in-frame deletions)
    in the MET proto-oncogene that cause skipping of exon 14 during mRNA splicing,
    removing the juxtamembrane domain that targets MET for ubiquitin-mediated degradation
    and resulting in sustained MET kinase signaling. METex14 skipping is a predictive
    biomarker for MET inhibitors in NSCLC.
  clinical_context: MET exon 14 skipping mutations are detected in approximately 3–4%
    of NSCLC, predominantly in adenocarcinoma and sarcomatoid histologies, and are
    enriched in older patients. Capmatinib (Tabrecta) and tepotinib (Tepmetko) are
    FDA-approved MET inhibitors for adult patients with metastatic NSCLC harboring
    METex14 skipping alterations; companion diagnostic NGS testing is required by
    FDA labeling for both agents. METex14 tumors respond poorly to conventional chemotherapy
    and are distinct from MET amplification, which represents a different mechanism
    of MET pathway activation.
