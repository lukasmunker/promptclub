- id: tumor-type-neuroendocrine-tumor
  term: Neuroendocrine Tumor
  aliases:
  - NET
  - neuroendocrine neoplasm
  - NEN
  - carcinoid tumor
  - pancreatic NET
  - pNET
  - gastroenteropancreatic NET
  - GEP-NET
  category: tumor-type
  short_definition: Neuroendocrine tumors are a heterogeneous group of neoplasms arising
    from neuroendocrine cells distributed throughout the body, most commonly in the
    gastrointestinal tract and pancreas. They are graded by Ki-67 proliferation index
    and mitotic rate (WHO G1, G2, G3), which strongly predict behavior and guide therapy.
  clinical_context: NETs range from indolent, well-differentiated low-grade tumors
    (G1/G2 carcinoids) to aggressive poorly differentiated neuroendocrine carcinomas
    (G3). Functional NETs secrete hormones causing characteristic clinical syndromes
    (e.g., carcinoid syndrome with serotonin secretion, Zollinger-Ellison syndrome
    with gastrinoma). Somatostatin analogues (octreotide, lanreotide) are first-line
    therapy for well-differentiated functional and progressive gastroenteropancreatic
    NETs; everolimus and sunitinib are approved for pancreatic NETs; 177Lu-dotatate
    (Lutathera) peptide receptor radionuclide therapy is approved for somatostatin
    receptor-positive GEP-NETs.
