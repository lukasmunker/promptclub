- id: study-design-crossover
  term: Crossover Trial
  aliases:
  - Crossover Study
  - Cross-Over Trial
  - Within-Subject Crossover
  category: study-design
  short_definition: A clinical trial design in which each participant receives two
    or more interventions in a sequential manner, with each participant serving as
    their own control across treatment periods separated by a washout interval.
  clinical_context: Crossover designs increase statistical power by eliminating between-subject
    variability, because each participant receives all treatments. They require a
    stable, chronic condition and an adequate washout period to prevent carryover
    effects from the prior treatment. In oncology, crossover designs are used primarily
    in pharmacokinetic drug-drug interaction studies, palliative symptom control research,
    and certain Phase II studies; they are rarely used as pivotal designs because
    disease progression typically precludes the second treatment period. Carryover
    effects and period effects must be assessed and accounted for in the statistical
    analysis.
