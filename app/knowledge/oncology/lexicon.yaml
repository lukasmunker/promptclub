- id: endpoint-pro
  term: Patient-Reported Outcomes
  aliases:
  - PRO
  - Patient Reported Outcomes
  category: endpoint
  short_definition: Patient-Reported Outcomes are any reports of the status of a patient's
    health condition that come directly from the patient, without interpretation by
    a clinician or anyone else, typically collected via validated questionnaires.
  clinical_context: PROs capture symptoms, functional status, and treatment tolerability
    from the patient's perspective, and are increasingly required by the FDA as co-primary
    or key secondary endpoints in oncology trials to complement clinician-assessed
    endpoints. The FDA's PRO guidance emphasizes that the instrument must be fit-for-purpose,
    with evidence of content validity, reliability, and responsiveness in the target
    population. In oncology, PROs covering disease-related symptoms (e.g., pain, fatigue)
    and treatment-related side effects are particularly relevant because they measure
    dimensions of benefit and burden not captured by objective tumor assessments.
    Missing PRO data due to clinical deterioration introduce informative missingness,
    requiring protocol-specified multiple imputation or tipping-point sensitivity
    analyses.
  typical_values: null
  related_terms:
  - Quality of Life
  - Overall Survival
