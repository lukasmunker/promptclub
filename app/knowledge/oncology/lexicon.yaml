- id: response-criterion-percist
  term: PERCIST
  aliases:
  - PERCIST 1.0
  - PET Response Criteria in Solid Tumors
  - Positron Emission Tomography Response Criteria in Solid Tumors
  category: response-criterion
  short_definition: PERCIST (PET Response Criteria in Solid Tumors) is a standardized
    framework for quantifying metabolic tumor response using FDG-PET/CT, based on
    peak standardized uptake value corrected for lean body mass (SULpeak) in the hottest
    1-cm3 region of the most active lesion. It defines four response categories—Complete
    Metabolic Response (CMR), Partial Metabolic Response (PMR), Stable Metabolic Disease
    (SMD), and Progressive Metabolic Disease (PMD)—analogous to RECIST but based on
    metabolic activity.
  clinical_context: PERCIST is applied in solid tumor clinical trials and practice
    settings where FDG-PET/CT is available and appropriate, providing metabolic response
    data that may detect response earlier or more sensitively than anatomical size
    criteria alone. It is particularly relevant in tumor types with high FDG avidity
    such as lung cancer, esophageal cancer, and lymphoma, and is complementary to
    RECIST 1.1. Strict standardization of PET acquisition and reconstruction parameters
    is required for valid PERCIST measurements, limiting its use to centers with robust
    PET infrastructure. PERCIST has growing acceptance in early-phase trials but has
    not yet achieved the same regulatory endorsement as RECIST 1.1.
