- id: treatment-line-consolidation
  term: Consolidation Therapy
  aliases:
  - consolidation treatment
  - consolidation phase
  - post-remission therapy
  - intensification therapy
  category: treatment-line
  short_definition: Treatment administered after successful induction therapy has
    achieved remission or maximal response, with the goal of eradicating residual
    disease and preventing relapse. It typically follows a defined induction phase
    and precedes, or substitutes for, maintenance therapy.
  clinical_context: Consolidation therapy is most clearly defined in the context of
    acute leukemias, where it follows induction chemotherapy that has achieved complete
    remission (CR), with the aim of eliminating measurable residual disease (MRD).
    Eligibility is gated by confirmed CR or near-CR after induction, bone marrow reassessment,
    and organ function recovery. A representative example is high-dose cytarabine
    (HiDAC) consolidation cycles administered after standard induction in acute myeloid
    leukemia (AML). In other settings, such as follicular lymphoma or multiple myeloma,
    consolidation may refer to high-dose chemotherapy followed by autologous stem
    cell transplantation performed after initial response.
  typical_values: null
  related_terms:
