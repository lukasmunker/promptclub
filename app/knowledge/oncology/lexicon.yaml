  category: tumor-type
  short_definition: Bladder cancer is a malignant neoplasm arising from the urothelium
    of the bladder; urothelial (transitional cell) carcinoma is the most common histologic
    subtype. It is the sixth most common cancer in the United States and is strongly
    associated with tobacco smoking and occupational exposure to aromatic amines.
  clinical_context: Bladder cancer is classified as non-muscle-invasive (NMIBC; stages
    Ta, T1, Tis) or muscle-invasive (MIBC; T2+), with distinct management strategies.
    NMIBC is managed endoscopically with intravesical therapy (BCG); high-risk NMIBC
    may require cystectomy. MIBC standard of care includes neoadjuvant cisplatin-based
    chemotherapy followed by radical cystectomy; cisplatin-ineligible patients may
    receive neoadjuvant pembrolizumab followed by cystectomy. First-line metastatic
    treatment includes platinum-based chemotherapy plus enfortumab vedotin plus pembrolizumab;
    enfortumab vedotin plus pembrolizumab is FDA-approved for first-line cisplatin-ineligible
    patients.
