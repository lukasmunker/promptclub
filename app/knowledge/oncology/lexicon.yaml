  short_definition: CAR-T cell therapies are autologous or allogeneic T cells genetically
    engineered to express a chimeric antigen receptor (CAR) that recognizes a specific
    tumor surface antigen, enabling targeted cytotoxicity independent of MHC-peptide
    presentation.
  clinical_context: FDA-approved CAR-T products include tisagenlecleucel (Kymriah)
