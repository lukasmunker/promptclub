- id: tumor-type-hodgkin-lymphoma
  term: Hodgkin Lymphoma
  aliases:
  - HL
  - Hodgkin disease
  - Hodgkin's lymphoma
  - classical Hodgkin lymphoma
  - cHL
  category: tumor-type
  short_definition: Hodgkin lymphoma is a lymphoid neoplasm characterized by the presence
    of Reed-Sternberg cells (large, binucleated or multinucleated B-cell-derived cells)
    in a reactive inflammatory background. Classical Hodgkin lymphoma accounts for
    approximately 95% of cases, with nodular lymphocyte-predominant HL comprising
    the remainder.
  clinical_context: HL is one of the most curable cancers; overall cure rates exceed
    80-90% for early-stage disease. It has a bimodal age distribution, with peaks
    in young adults (15-35 years) and older adults. Standard first-line treatment
    for early-stage favorable disease is ABVD (doxorubicin, bleomycin, vinblastine,
    dacarbazine) with or without involved-field radiation; advanced-stage disease
    is treated with escalated BEACOPP or AVD plus brentuximab vedotin. PET-CT-adapted
    therapy and brentuximab vedotin have improved outcomes particularly in advanced
    disease.
