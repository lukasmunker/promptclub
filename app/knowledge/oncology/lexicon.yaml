  - neurotrophic tyrosine kinase fusion
  category: biomarker
  short_definition: Chromosomal rearrangements fusing one of the three NTRK genes
    (NTRK1, NTRK2, or NTRK3) encoding TrkA, TrkB, and TrkC receptor tyrosine kinases
    with various 5' partner genes, generating constitutively active TRK fusion oncoproteins
