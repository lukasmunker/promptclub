- id: treatment-line-salvage
  term: Salvage Therapy
  aliases:
  - salvage treatment
  - rescue therapy
  - salvage chemotherapy
  - salvage regimen
  category: treatment-line
  short_definition: Systemic treatment administered with the intent to achieve disease
    control or response in patients who have relapsed or are refractory to prior lines
    of therapy, particularly when cure remains a goal (e.g., to bridge to transplant)
    or when palliation of refractory disease is needed.
  clinical_context: Salvage therapy is typically initiated after failure of one or
    more standard lines of therapy and carries the implication of treating relapsed
    or refractory disease. In hematologic malignancies, the primary goal is often
    to achieve sufficient response to proceed to autologous or allogeneic stem cell
    transplantation; representative examples include R-ICE or R-DHAP as salvage regimens
    for relapsed/refractory diffuse large B-cell lymphoma. In solid tumors, the term
    is used interchangeably with later-line therapy. Decision criteria include prior
    treatment history, organ function, donor/graft availability, and patient fitness
    for intensive regimens. The term carries no fixed numeric line designation and
    may overlap with second-line or third-line contexts.
