- id: tumor-type-cll
  term: Chronic Lymphocytic Leukemia
  aliases:
  - CLL
  - B-cell chronic lymphocytic leukemia
  - chronic lymphoid leukemia
  - small lymphocytic lymphoma
  - SLL
  category: tumor-type
  short_definition: Chronic lymphocytic leukemia is a mature B-cell lymphoproliferative
    disorder characterized by the accumulation of small, monomorphic neoplastic B
    lymphocytes in the blood, bone marrow, lymph nodes, and spleen. It is the most
    common leukemia in adults in Western countries.
  clinical_context: CLL and small lymphocytic lymphoma (SLL) represent the same disease
    entity distinguished by the degree of blood involvement; both are classified under
    the same WHO entity. Indolent disease may be managed with active surveillance;
    treatment is initiated for symptomatic or progressive disease. First-line regimens
