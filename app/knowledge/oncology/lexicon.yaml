- id: resistance-mechanism-met-amplification
  term: MET amplification
  aliases:
  - MET gene amplification
  - c-MET amplification
  - MNNG HOS Transforming gene amplification
  category: resistance-mechanism
  short_definition: Focal amplification of the MET proto-oncogene resulting in MET
    receptor overexpression and constitutive activation of downstream PI3K/AKT and
    RAS/MAPK signaling pathways, bypassing inhibited EGFR. It is a recognised mechanism
    of acquired resistance to EGFR tyrosine kinase inhibitors in EGFR-mutant NSCLC.
  clinical_context: MET amplification is detected in approximately 5–20% of EGFR-mutant
    NSCLC tumors progressing on first-, second-, or third-generation EGFR TKIs, with
    higher rates reported after osimertinib failure. It is identified by fluorescence
    in situ hybridization (FISH) or next-generation sequencing of re-biopsy tissue
    or plasma cfDNA. Combination regimens pairing an EGFR TKI with a MET inhibitor
    (e.g., tepotinib, savolitinib, capmatinib) are under active clinical investigation
    or have received regulatory approval in specific contexts. The co-occurrence of
    EGFR mutation and high-level MET amplification at progression mandates molecular
    re-testing.
