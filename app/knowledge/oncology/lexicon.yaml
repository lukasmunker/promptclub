- id: endpoint-rfs
  term: Recurrence-Free Survival
  aliases:
  - RFS
  category: endpoint
  short_definition: Recurrence-Free Survival is the time from definitive treatment
    or complete response until documented disease recurrence or death, used in curative-intent
    settings to capture both local and distant relapse events.
  clinical_context: RFS is closely related to Disease-Free Survival; distinctions
    between the two terms vary across sponsors and disease areas, and the FDA guidance
    notes that these terms are sometimes used interchangeably. In practice, RFS typically
    focuses on relapse after an established remission, whereas DFS may include second
    primary malignancies as events depending on protocol. Accurate and blinded radiologic
    or pathologic confirmation of recurrence is critical to the integrity of RFS data.
    The endpoint is accepted as a primary efficacy endpoint for adjuvant therapy approval
    when the recurrence rate is high enough to provide adequate event-driven power.
  typical_values: null
  related_terms:
