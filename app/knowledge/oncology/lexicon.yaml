- id: treatment-line-third-line
  term: Third-Line Therapy
  aliases:
  - 3L
  - third-line treatment
  - 3rd-line therapy
  category: treatment-line
  short_definition: A systemic treatment regimen administered after failure of or
    progression on two prior lines of therapy. It represents a later-line treatment
    context associated with increasingly refractory disease.
  clinical_context: Third-line therapy is initiated following documented progression
    on, or intolerance to, two distinct prior systemic regimens for the same cancer
    indication. Decision criteria include performance status, cumulative toxicity
    from prior regimens, and availability of actionable molecular targets. A representative
    example is trifluridine/tipiracil (TAS-102) as third-line or later therapy for
    metastatic colorectal cancer after failure of fluoropyrimidine-, oxaliplatin-,
    and irinotecan-based regimens. Response rates in third-line settings are generally
    lower and trials often use overall survival or progression-free survival as primary
    endpoints.
