- id: study-design-dose-escalation
  term: Dose-Escalation Study
  aliases:
  - Dose Escalation Study
  - Phase I Dose-Escalation
  - Dose-Finding Study
  - First-in-Human Dose Escalation
  category: study-design
  short_definition: A Phase I study design in which successive cohorts of patients
    receive increasing doses of an investigational agent to characterize safety, tolerability,
    pharmacokinetics, and pharmacodynamics, and to identify the maximum tolerated
    dose or recommended Phase II dose.
  clinical_context: Dose-escalation studies employ pre-specified escalation rules
    such as the 3+3 design, accelerated titration, or model-based Bayesian approaches
    (e.g., continual reassessment method, escalation with overdose control) to balance
    safety and information gain. Dose-limiting toxicities observed during a defined
    observation period trigger escalation decisions; the maximum tolerated dose is
    conventionally defined as the dose below which dose-limiting toxicities occur
    in more than one-third of patients. The NCI Cancer Therapy Evaluation Program
    provides operational guidance on the conduct of Phase I trials and the definition
    of dose-limiting toxicities for solid tumor and hematologic malignancy studies.
    Pharmacokinetic and pharmacodynamic sampling is integral to modern oncology dose-escalation
    designs.
