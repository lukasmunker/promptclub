  - PCWG3 Criteria
  - Prostate Cancer Clinical Trials Working Group 3
  category: response-criterion
  short_definition: PCWG3 (Prostate Cancer Working Group 3) provides updated recommendations
    for trial eligibility, endpoints, and definitions of response and progression
    in prostate cancer clinical trials, including criteria for PSA response, bone
    scan progression, soft tissue response, and the concept of "no longer clinically
    benefiting" to guide treatment discontinuation. It emphasizes that progression
    in any single domain (PSA, bone, soft tissue) should be interpreted in the context
    of the overall clinical picture.
  clinical_context: PCWG3 criteria apply to castration-resistant prostate cancer (CRPC)
    and hormone-sensitive prostate cancer (HSPC) clinical trials, addressing the multi-compartmental
    nature of prostate cancer progression including bone, lymph node, visceral, and
    PSA domains. Key features include the 12-week rule delaying first bone scan assessment
    to avoid confounding flare phenomena, specific PSA decline thresholds (e.g., ≥50%
    decline confirmed at 4 weeks), and standardized bone scan progression criteria
    requiring two or more new lesions confirmed on a subsequent scan. PCWG3 recommendations
    are widely adopted by investigators and sponsors in prostate cancer trials and
    align with FDA guidance on endpoint selection for this disease.
