  term: Post-Marketing Surveillance
  aliases:
  - PMS
  - pharmacovigilance
  - post-market surveillance
  - post-authorization safety surveillance
  category: trial-phase
  short_definition: Post-marketing surveillance refers to the ongoing monitoring of
    the safety, quality, and performance of an approved drug or biologic product in
    routine clinical use after it has been authorized for marketing.
  clinical_context: Post-marketing surveillance encompasses spontaneous adverse event
    reporting (e.g., FDA MedWatch), mandated post-marketing safety studies, registries,
    and observational database studies. Regulatory frameworks require marketing authorization
    holders to maintain pharmacovigilance systems and submit periodic safety update
    reports (PSURs/PBRERs) to agencies such as FDA and EMA. In oncology, post-marketing
    surveillance is critical for detecting rare or delayed toxicities, drug-drug interactions,
    and safety signals in populations underrepresented in pre-approval trials. FDA's
    Sentinel System and EMA's EudraVigilance database are key infrastructure for systematic
    post-marketing safety monitoring.
