- id: study-design-rct
  term: Randomized Controlled Trial
  aliases:
  - RCT
  - Randomized Clinical Trial
  - Randomised Controlled Trial
  category: study-design
  short_definition: A prospective study in which participants are randomly allocated
    to receive either an experimental intervention or a control (placebo, standard
    of care, or active comparator), with outcomes compared between groups. Randomization
    minimizes selection bias and enables causal inference.
  clinical_context: RCTs are the gold standard for evaluating therapeutic efficacy
    and safety in oncology drug development. In Phase III oncology trials, the comparator
    arm is typically the current standard of care. Randomization stratification factors
    (e.g., performance status, biomarker status) are pre-specified to ensure balance.
    The FDA and EMA generally require at least one adequate and well-controlled RCT
    as primary evidence of effectiveness for full approval.
  typical_values: null
