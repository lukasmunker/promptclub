- id: response-criterion-lugano
  term: Lugano Classification
  aliases:
  - Lugano Criteria
  - Lugano Response Criteria
  - Cheson 2014 Criteria
  category: response-criterion
  short_definition: The Lugano Classification is the international standard for staging
    and response assessment in lymphoma, integrating PET-CT (using the Deauville five-point
    scale) with CT-based measurements to define Complete Metabolic Response (CMR),
    Partial Metabolic Response (PMR), No Metabolic Response (NMR), and Progressive
    Metabolic Disease (PMD). It superseded the 2007 revised response criteria for
    lymphoma.
  clinical_context: The Lugano Classification applies to Hodgkin lymphoma (HL) and
    non-Hodgkin lymphoma (NHL), unifying staging and end-of-treatment response assessment.
    PET-CT with the Deauville score is central to the criteria, enabling assessment
    of metabolic activity rather than size alone, which is particularly important
    for bulky residual masses. For indolent lymphomas or when PET is unavailable,
    CT-only criteria are retained. The criteria are used in pivotal clinical trials
    and are accepted by the FDA and EMA for lymphoma response endpoints.
