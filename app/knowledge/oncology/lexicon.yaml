- id: tumor-type-crpc
  term: Castration-Resistant Prostate Cancer
  aliases:
  - CRPC
  - castration resistant prostate cancer
  - hormone-refractory prostate cancer
  - androgen-independent prostate cancer
  category: tumor-type
  short_definition: Castration-resistant prostate cancer is defined by disease progression
    despite castrate serum testosterone levels (<50 ng/dL), achieved through surgical
    or medical (LHRH agonist/antagonist) castration. CRPC may be non-metastatic (nmCRPC)
    or metastatic (mCRPC).
  clinical_context: CRPC develops in the majority of patients on androgen deprivation
    therapy, typically within 2-3 years, driven by androgen receptor pathway alterations,
    splice variants (AR-V7), and other resistance mechanisms. Approved therapies for
    mCRPC include enzalutamide, abiraterone acetate, docetaxel, cabazitaxel, radium-223
    (for bone-predominant disease), 177Lu-PSMA-617, and PARP inhibitors (olaparib,
    rucaparib) for BRCA-mutated disease. PSMA PET imaging is used for staging and
    selecting patients for lutetium-PSMA therapy.
  typical_values: null
