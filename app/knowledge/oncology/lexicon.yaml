  term: Tumor Mutational Burden
  aliases:
  - TMB
  - TMB-H
  - Tumor Mutational Burden-High
  - somatic mutation load
  category: biomarker
  short_definition: A quantitative measure of the total number of somatic coding mutations
    (substitutions and insertions/deletions) per megabase of DNA sequenced in a tumor
    genome, reflecting the tumor's overall mutational load. High TMB (TMB-H) is a
    pan-tumor predictive biomarker for response to PD-1 immune checkpoint inhibitors.
  clinical_context: Pembrolizumab received FDA tumor-agnostic approval in 2020 for
    unresectable or metastatic solid tumors with TMB-H (≥10 mutations per megabase,
    as measured by the FoundationOne CDx assay), making TMB-H the second tissue-agnostic
    biomarker approved for pembrolizumab. The FoundationOne CDx NGS panel is the FDA-approved
    companion diagnostic for this indication. TMB-H and MSI-H are partially overlapping
    but distinct biomarkers; each can independently predict immunotherapy benefit.
    TMB varies substantially by tumor type, and the predictive value of the 10 mut/Mb
    threshold is heterogeneous across histologies.
