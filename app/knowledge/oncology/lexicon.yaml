- id: endpoint-cr
  term: Complete Response
  aliases:
  - CR
  - Complete Remission
  category: endpoint
  short_definition: Complete Response is the disappearance of all target and non-target
    lesions and normalization of tumor markers, sustained for at least the minimum
    duration specified by the applicable response criteria.
  clinical_context: CR is the most stringent response category within standard solid-tumor
    criteria such as RECIST 1.1 and is a key component of ORR alongside Partial Response.
    In hematologic malignancies, disease-specific definitions of CR incorporate bone
    marrow biopsy and flow cytometry findings in addition to radiologic assessments.
    Achievement of CR is itself used as a surrogate endpoint in certain approval settings,
    particularly in aggressive lymphomas and leukemias, when durability of response
    is demonstrated. Confirmation of CR typically requires a repeat assessment at
    least four weeks after the criteria are first met.
