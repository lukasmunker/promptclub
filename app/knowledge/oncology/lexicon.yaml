  - phase i trial
  - first-in-human study
  category: trial-phase
  short_definition: A Phase 1 clinical trial is the first stage of testing an investigational
    agent in humans, primarily designed to evaluate safety, tolerability, pharmacokinetics,
    and pharmacodynamics, and to determine the maximum tolerated dose or recommended
    dose for further study.
  clinical_context: Phase 1 trials typically enroll a small number of participants
    (20–80) and use a dose-escalation design to identify dose-limiting toxicities
    and establish a safe dose range. In oncology, these studies often enroll patients
    with advanced cancer who have exhausted standard therapies. The primary objective
    is safety characterization, not efficacy, although early signals of activity are
    frequently reported. Results from Phase 1 studies guide the design of subsequent
    Phase 2 trials.
