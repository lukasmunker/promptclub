- id: tumor-type-dlbcl
  term: Diffuse Large B-Cell Lymphoma
  aliases:
  - DLBCL
  - diffuse large B cell lymphoma
  - DLBL
  category: tumor-type
  short_definition: Diffuse large B-cell lymphoma is the most common aggressive non-Hodgkin
    lymphoma in adults, characterized by diffuse proliferation of large neoplastic
    B cells that efface the normal lymph node architecture. It is a potentially curable
    disease when treated with anthracycline-based immunochemotherapy.
  clinical_context: DLBCL accounts for approximately 30-40% of all non-Hodgkin lymphomas
    and most commonly presents with rapidly enlarging lymphadenopathy. Cell-of-origin
    (germinal center B-cell vs. activated B-cell subtype by gene expression profiling
    or IHC surrogate) and molecular features (MYC/BCL2/BCL6 rearrangements) provide
    prognostic information. Standard first-line treatment is R-CHOP (rituximab, cyclophosphamide,
    doxorubicin, vincristine, prednisone); polatuzumab vedotin plus R-CHP is an alternative.
    CAR-T therapies (axicabtagene ciloleucel, lisocabtagene maraleucel, tisagenlecleucel)
    are approved for relapsed/refractory disease.
