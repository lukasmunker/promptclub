  term: Follicular Lymphoma
  aliases:
  - FL
  - follicular non-Hodgkin lymphoma
  - grade 1-2 follicular lymphoma
  category: tumor-type
  short_definition: Follicular lymphoma is an indolent B-cell non-Hodgkin lymphoma
    arising from germinal center B cells, typically characterized by BCL2 rearrangement
    and overexpression of BCL2 protein. It is the second most common non-Hodgkin lymphoma
    in adults.
  clinical_context: Most patients with FL present at an advanced stage (III/IV) but
    with a relatively indolent course; a minority of cases transform to diffuse large
    B-cell lymphoma, which is associated with poor outcomes. Asymptomatic low-tumor-burden
    disease is often managed with active surveillance. Treatment for symptomatic or
    high-tumor-burden disease includes anti-CD20 antibody-based immunochemotherapy
    (bendamustine-rituximab or R-CHOP) followed by rituximab maintenance. Novel approaches
    include obinutuzumab-based regimens, PI3K inhibitors, and bispecific antibodies
    for relapsed/refractory disease.
