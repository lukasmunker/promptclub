- id: endpoint-mtd
  term: Maximum Tolerated Dose
  aliases:
  - MTD
  category: endpoint
  short_definition: Maximum Tolerated Dose is the highest dose of a drug that can
    be administered with an acceptable frequency and severity of dose-limiting toxicities
    in a defined patient population, as determined in Phase I dose-escalation trials.
  clinical_context: MTD is classically determined by the 3+3 or model-based dose-escalation
    designs in Phase I oncology trials and represents the upper boundary from which
    the recommended Phase II dose is selected. The FDA guidance on cancer endpoints
    acknowledges MTD as a key Phase I endpoint and notes that it is operationally
    defined by the incidence of DLTs in the escalation cohorts. In the era of targeted
    and immunologic therapies, MTD may not coincide with the biologically optimal
    dose, prompting use of alternative endpoints such as the optimal biological dose
    or the minimum effective dose. Reporting of MTD must be accompanied by the full
    DLT data and the dose-escalation schema used.
