  category: drug-class
  short_definition: mTOR inhibitors are agents that suppress the mechanistic target
    of rapamycin (mTOR) serine/threonine kinase complex, particularly mTORC1, thereby
    reducing translation of pro-proliferative proteins and inhibiting tumor cell growth
    and angiogenesis.
  clinical_context: FDA-approved mTOR inhibitors in oncology include everolimus (Afinitor)
    for advanced renal cell carcinoma, hormone receptor-positive HER2-negative breast
    cancer in combination with exemestane, and pancreatic neuroendocrine tumors, as
    well as temsirolimus (Torisel) for advanced renal cell carcinoma. Metabolic toxicities
    including hyperglycemia and hyperlipidemia, non-infectious pneumonitis, and immunosuppression
    are class-defining adverse effects. mTOR inhibitors are also used to prevent rejection
    in organ transplantation, which is relevant when managing oncology patients post-transplant.
