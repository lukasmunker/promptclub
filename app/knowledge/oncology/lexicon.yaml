- id: tumor-type-sclc
  term: Small Cell Lung Cancer
  aliases:
  - SCLC
  - small-cell lung carcinoma
  - oat cell carcinoma
  category: tumor-type
  short_definition: Small cell lung cancer is a high-grade neuroendocrine carcinoma
    of the lung characterized by rapid growth, early metastasis, and strong initial
    response to platinum-based chemotherapy. It comprises approximately 15% of all
    lung cancers.
  clinical_context: SCLC is classified as limited-stage or extensive-stage disease.
    Extensive-stage first-line standard of care includes carboplatin or cisplatin
    combined with etoposide plus an immune checkpoint inhibitor (atezolizumab or durvalumab).
    The prognosis is poor due to frequent relapse and development of chemotherapy
    resistance.
