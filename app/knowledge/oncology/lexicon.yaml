  - proteasome inhibitor
  - 26S proteasome inhibitor
  category: drug-class
  short_definition: Proteasome inhibitors block the 26S proteasome catalytic core,
    impairing ubiquitin-mediated protein degradation and leading to accumulation of
    misfolded proteins, induction of the unfolded protein response, and apoptosis,
    particularly in high-secretory plasma cells.
  clinical_context: FDA-approved proteasome inhibitors include bortezomib (Velcade),
    the first-in-class agent approved for multiple myeloma and mantle cell lymphoma,
    carfilzomib (Kyprolis), and ixazomib (Ninlaro). These agents are used across all
    lines of therapy in multiple myeloma, typically in combination with IMiDs and
    dexamethasone. Peripheral neuropathy is a significant class toxicity, particularly
    for bortezomib (partly mitigated by subcutaneous administration), while carfilzomib
    carries cardiovascular risk including hypertension and cardiac failure.
