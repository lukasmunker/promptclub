- id: endpoint-pk
  term: Pharmacokinetics
  aliases:
  - PK
  category: endpoint
  short_definition: Pharmacokinetics describes the quantitative relationship between
    drug administration and drug concentration over time in biological fluids, encompassing
    absorption, distribution, metabolism, and excretion.
  clinical_context: PK endpoints in oncology trials include parameters such as area
    under the concentration-time curve (AUC), maximum observed concentration (Cmax),
    trough concentration (Ctrough), half-life (t1/2), and clearance (CL), which are
    used to guide dose selection and schedule optimization. PK data inform the pharmacokinetic-pharmacodynamic
    (PK-PD) relationship and are essential for understanding inter-patient variability,
    drug-drug interactions, and the impact of hepatic or renal impairment on drug
    exposure. The NCI Thesaurus defines pharmacokinetics as the study of the time
    course of drug absorption, distribution, metabolism, and excretion. Regulatory
    submissions for oncology drugs are expected to include population PK analyses
    integrating data across multiple studies to characterize exposure-response relationships.
  typical_values: null
