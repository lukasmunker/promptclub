- id: resistance-mechanism-brca-reversion-mutation
  term: BRCA reversion mutation
  aliases:
  - BRCA reversion
  - secondary BRCA mutation
  - BRCA intragenic reversion
  - BRCA restoration mutation
  category: resistance-mechanism
  short_definition: Secondary intragenic mutations in BRCA1 or BRCA2 that restore
    the open reading frame or partially restore protein function, thereby re-establishing
    homologous recombination DNA repair and conferring resistance to PARP inhibitors
    and platinum-based chemotherapy. These mutations arise in tumor cells that had
    previously lost BRCA function.
  clinical_context: BRCA reversion mutations are a well-characterised mechanism of
    acquired resistance to PARP inhibitors (olaparib, niraparib, rucaparib, talazoparib)
    and platinum agents in BRCA1/2-mutated ovarian, breast, and prostate cancers.
    They are detected by tumor re-biopsy or plasma cfDNA next-generation sequencing
    at the time of progression and may involve multiple independent reversion events
    within a heterogeneous tumor. No approved targeted therapy currently exists to
    overcome BRCA reversion, and subsequent systemic therapy selection is guided by
    histology and prior treatment history. Identification of reversion mutations has
    implications for clinical trial eligibility and for understanding mechanisms of
    primary versus secondary resistance.
