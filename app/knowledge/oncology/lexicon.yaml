- id: endpoint-mrd
  term: Minimal Residual Disease
  aliases:
  - MRD
  - Measurable Residual Disease
  category: endpoint
  short_definition: Minimal Residual Disease refers to the small number of malignant
    cells that may remain in a patient after treatment, detected by highly sensitive
    molecular or flow-cytometric assays below the threshold of conventional morphology.
    MRD status is an emerging surrogate endpoint in hematologic malignancies.
  clinical_context: MRD assessment in conditions such as acute lymphoblastic leukemia
    and multiple myeloma has been validated to correlate with progression-free and
    overall survival at sensitivity thresholds of 10^-4 to 10^-6 malignant cells.
    The NCI Thesaurus defines MRD as the persistence of leukemic or other malignant
    cells at levels undetectable by standard morphology but identifiable by PCR, next-generation
    sequencing, or multiparameter flow cytometry. Standardization of assay platforms,
    sensitivity thresholds, tissue source, and timing of assessment is required for
    MRD to be used reliably as a trial endpoint. The FDA has engaged with MRD as an
    endpoint through disease-specific guidance and through the Oncology Center of
    Excellence's Project Optimus and biomarker qualification programs.
