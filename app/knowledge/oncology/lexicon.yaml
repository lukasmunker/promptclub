- id: response-criterion-imwg
  term: International Myeloma Working Group Criteria
  aliases:
  - IMWG Response Criteria
  - IMWG Criteria
  - Myeloma Response Criteria
  - IMWG Uniform Response Criteria
  category: response-criterion
  short_definition: The IMWG (International Myeloma Working Group) Criteria are the
    standard response assessment framework for multiple myeloma, using serum and urine
    M-protein, serum free light chain (FLC) ratios, and bone marrow plasma cell percentages
    to define response categories from Stringent Complete Response (sCR) through Minimal
    Response (MR) and Progressive Disease (PD). The 2016 update incorporated minimal
    residual disease (MRD) negativity as a new deep response category.
  clinical_context: IMWG criteria apply specifically to multiple myeloma and related
    plasma cell dyscrasias, covering both secretory and non-secretory disease. Biochemical
    markers—serum and 24-hour urine M-protein, serum free light chains—are the primary
    response endpoints, supplemented by bone marrow assessment for stringent response
    definitions. The 2016 update added MRD negativity assessed by next-generation
    sequencing or flow cytometry as a prognostically important endpoint increasingly
    used in clinical trials and regulatory submissions. These criteria are accepted
    by FDA and EMA for registration trials in multiple myeloma.
