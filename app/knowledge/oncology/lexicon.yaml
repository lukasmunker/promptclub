- id: tumor-type-gastric-cancer
  term: Gastric Cancer
  aliases:
  - gastric carcinoma
  - stomach cancer
  - stomach adenocarcinoma
  - GC
  - gastroesophageal junction cancer
  - GEJ cancer
  category: tumor-type
  short_definition: Gastric cancer is a malignant neoplasm of the stomach, the majority
    of which are adenocarcinomas, and is the fifth most common cancer and fourth leading
    cause of cancer-related mortality worldwide. Risk factors include Helicobacter
    pylori infection, dietary factors, and family history.
  clinical_context: Gastric cancer is molecularly classified by The Cancer Genome
    Atlas (TCGA) into four subtypes (EBV, MSI, genomically stable, chromosomally unstable),
    which have therapeutic implications. HER2 overexpression/amplification occurs
    in approximately 15-20% of tumors and predicts benefit from trastuzumab plus chemotherapy
    as first-line therapy (for HER2-positive disease); PD-L1 CPS guides addition of
    nivolumab or pembrolizumab to first-line chemotherapy. Most patients present with
    advanced unresectable disease; perioperative FLOT is standard for resectable gastric/GEJ
    adenocarcinoma.
