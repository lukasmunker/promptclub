- id: treatment-line-maintenance
  term: Maintenance Therapy
  aliases:
  - maintenance treatment
  - maintenance phase
  - continuation maintenance
  - switch maintenance
  category: treatment-line
  short_definition: Treatment administered after a patient achieves a response or
    stable disease on initial (induction) therapy, with the goal of prolonging disease
    control or delaying progression. It is given continuously or cyclically until
    progression or unacceptable toxicity.
  clinical_context: 'Maintenance therapy is initiated following completion of a defined
    induction phase when the patient has not progressed. Two main subtypes exist:
    continuation maintenance (continuing an agent used during induction) and switch
    maintenance (introducing a new agent not used in induction). Eligibility is gated
    by achieving at least stable disease at the end of induction and adequate organ
    function. A prototypical example is bevacizumab continuation maintenance or pemetrexed
    switch maintenance after platinum-based induction chemotherapy in advanced non-squamous
    NSCLC. The line-of-therapy attribution of maintenance is protocol- and labeling-dependent;
    some frameworks count it as a continuation of first-line rather than a separate
    line.'
