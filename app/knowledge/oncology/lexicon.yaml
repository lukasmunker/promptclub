- id: resistance-mechanism-emt
  term: EMT
  aliases:
  - Epithelial-Mesenchymal Transition
  - epithelial-to-mesenchymal transition
  - EMT-mediated resistance
  category: resistance-mechanism
  short_definition: A biological program in which tumor cells lose epithelial characteristics
    (E-cadherin expression, apical-basal polarity) and acquire mesenchymal features
    (vimentin, fibronectin expression, motility), conferring resistance to EGFR and
    other receptor tyrosine kinase inhibitors. EMT-driven resistance involves rewiring
    of downstream signaling and reduced drug uptake.
  clinical_context: EMT has been identified as a mechanism of acquired resistance
    to EGFR TKIs in NSCLC, with resistant tumor cells displaying loss of E-cadherin
    and gain of vimentin or fibronectin on repeat biopsy immunohistochemistry. Unlike
    point mutations, EMT-mediated resistance is not directly targeted by approved
    therapies, but preclinical data suggest sensitivity to agents targeting the AXL
    or MET receptors that are upregulated during EMT. Detection requires tissue re-biopsy,
    as EMT biomarkers are not routinely captured by liquid biopsy panels. EMT may
    co-occur with other resistance mechanisms, making comprehensive molecular profiling
    of progressive lesions essential.
