- id: response-criterion-cheson-aml-mds
  term: Cheson Criteria
  aliases:
  - Cheson AML/MDS Criteria
  - IWG Response Criteria for AML
  - International Working Group AML Response Criteria
  category: response-criterion
  short_definition: The Cheson Criteria (IWG 2003) are standardized response definitions
    for acute myeloid leukemia (AML) and myelodysplastic syndromes (MDS), establishing
    categories such as Complete Remission (CR), Partial Remission (PR), Hematologic
    Improvement (HI), and cytogenetic and molecular response subcategories. They rely
    on bone marrow blast percentage, peripheral blood counts, and cytogenetic findings
    rather than imaging.
  clinical_context: The Cheson 2003 criteria provided the first internationally harmonized
    framework for defining response in AML and MDS, enabling cross-trial comparability
    in hematologic malignancies. CR in AML requires fewer than 5% bone marrow blasts
    with recovery of peripheral blood counts, while HI categories in MDS assess erythroid,
    platelet, and neutrophil improvements. These criteria form the basis for regulatory
    approval endpoints in AML and MDS trials and have been refined by subsequent IWG
    updates. They are essential for comparing outcomes across chemotherapy, targeted
    therapy, and hypomethylating agent studies.
  typical_values: null
  related_terms:
