  - Phase Ib Expansion Cohort
  - Cohort Expansion
  category: study-design
  short_definition: An additional cohort enrolled into a Phase I trial at or near
    the recommended Phase II dose to gather further safety, pharmacokinetic, pharmacodynamic,
    or preliminary efficacy data in a defined patient population, beyond the dose-escalation
    portion of the study.
  clinical_context: Expansion cohorts are a component of oncology first-in-human trials
    and are governed by the same IND as the parent Phase I study. The FDA guidance
    on expansion cohorts notes that they may enroll hundreds of patients and generate
    data that support accelerated approval, blurring the boundary between Phase I
    and Phase II. Pre-specified objectives, stopping rules, and eligibility criteria
    for each expansion cohort must be prospectively defined; the FDA recommends early
    consultation with the agency when substantial evidence for a regulatory claim
    is anticipated from an expansion cohort. Multiple simultaneous expansion cohorts
    targeting different tumor types are common in oncology Phase I programs.
