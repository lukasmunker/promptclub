- id: endpoint-pfs
  term: Progression-Free Survival
  aliases:
  - PFS
  category: endpoint
  short_definition: Progression-Free Survival is the time from randomization until
    objective tumor progression or death from any cause, whichever occurs first. It
    is widely used as a primary endpoint in oncology trials where OS data are not
    yet mature.
  clinical_context: PFS encompasses the composite of disease progression and death,
    making it more informative than time-to-progression alone. Tumor assessments must
    be performed at pre-specified, regular intervals to minimize assessment-time bias.
    The FDA may accept PFS as a basis for regular or accelerated approval depending
    on the magnitude of the effect and the availability of OS data. Agreement on progression
    criteria—typically RECIST—is essential for reliable cross-trial comparisons.
