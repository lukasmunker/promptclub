- id: study-design-window-of-opportunity
  term: Window of Opportunity Trial
  aliases:
  - Window-of-Opportunity Study
  - Pre-Surgical Window Study
  - WoO Trial
  category: study-design
  short_definition: An early-phase study design in which an investigational agent
    is administered to patients in the interval between cancer diagnosis and their
    planned definitive treatment (e.g., surgery or initiation of standard therapy),
    to assess pharmacodynamic, biological, and preliminary clinical effects.
  clinical_context: Window of opportunity trials are conducted primarily in early-stage
    or resectable cancers (e.g., breast, colorectal, prostate) where surgical resection
    provides pre- and post-treatment tumor tissue for pharmacodynamic biomarker analysis.
    These studies enable direct measurement of target engagement, modulation of signaling
    pathways, and early evidence of biological activity in the human tumor microenvironment
    without delaying definitive therapy beyond an ethically acceptable window. Endpoints
    typically include changes in proliferation (Ki67), apoptosis, or biomarker expression
    between pre-treatment biopsy and surgical specimen. Because the window is brief
    and sample sizes are small, these studies are hypothesis-generating and not powered
    for clinical efficacy.
