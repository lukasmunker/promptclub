- id: tumor-type-pancreatic-cancer
  term: Pancreatic Cancer
  aliases:
  - pancreatic carcinoma
  - pancreatic ductal adenocarcinoma
  - PDAC
  - exocrine pancreatic cancer
  category: tumor-type
  short_definition: Pancreatic cancer most commonly refers to pancreatic ductal adenocarcinoma
    (PDAC), a highly aggressive malignancy arising from the exocrine pancreas with
    one of the poorest prognoses of any solid tumor. The five-year survival rate across
    all stages is approximately 12%.
  clinical_context: PDAC frequently presents at an advanced, unresectable stage due
    to late onset of symptoms. Surgical resection offers the only potential for cure
    but is possible in fewer than 20% of patients at diagnosis. First-line treatment
    for metastatic disease includes FOLFIRINOX or gemcitabine plus nab-paclitaxel;
    BRCA1/2 germline mutation testing is recommended as PARP inhibitors (olaparib)
    have maintenance approval in platinum-sensitive BRCA-mutated metastatic disease.
    KRAS G12C and G12D targeted therapies are under active investigation.
  typical_values: null
