  term: Acute Myeloid Leukemia
  aliases:
  - AML
  - acute myelogenous leukemia
  - acute myeloblastic leukemia
  - acute nonlymphocytic leukemia
  category: tumor-type
  short_definition: Acute myeloid leukemia is a rapidly progressing hematologic malignancy
    characterized by clonal proliferation of immature myeloid progenitor cells (blasts)
    in the bone marrow and peripheral blood, leading to bone marrow failure. It is
    defined by ≥20% myeloblasts in the bone marrow or peripheral blood.
  clinical_context: AML is the most common acute leukemia in adults and carries a
    poor prognosis overall, with outcomes strongly influenced by cytogenetic and molecular
    features (FLT3, IDH1/2, NPM1, TP53 mutations). Standard induction therapy is cytarabine
    combined with an anthracycline (7+3 regimen) with or without targeted agents (midostaurin
    for FLT3-mutated AML, venetoclax for older/unfit patients). Allogeneic stem cell
    transplantation remains the standard consolidation for eligible intermediate-
    and high-risk patients in first remission.
