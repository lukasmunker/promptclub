- id: endpoint-dfs
  term: Disease-Free Survival
  aliases:
  - DFS
  - Relapse-Free Survival
  category: endpoint
  short_definition: Disease-Free Survival is the time from randomization or definitive
    surgery until disease recurrence or death from any cause in patients who have
    achieved complete remission or curative resection. It is commonly used in adjuvant
    treatment settings.
  clinical_context: DFS is appropriate when the patient population has no detectable
    disease at study entry, such as after definitive local therapy or complete response
    to induction chemotherapy. Because death is included as an event, DFS avoids the
    informative censoring problem seen with recurrence-only endpoints. The FDA recognizes
    DFS as a primary endpoint capable of supporting regular approval in adjuvant settings
    when the benefit is large and durable. Definitions of 'recurrence' must be pre-specified
    and adjudicated consistently.
