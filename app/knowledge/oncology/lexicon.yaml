  - aromatase inhibitor
  - third-generation AI
  category: drug-class
  short_definition: Aromatase inhibitors suppress estrogen biosynthesis by blocking
    the aromatase enzyme (CYP19A1), which converts androgens to estrogens in peripheral
    tissues, thereby reducing circulating estrogen levels and depriving hormone receptor-positive
    tumors of an essential mitogenic stimulus.
  clinical_context: Third-generation non-steroidal aromatase inhibitors anastrozole
    (Arimidex) and letrozole (Femara), and steroidal exemestane (Aromasin), are FDA-approved
    for hormone receptor-positive breast cancer in postmenopausal women in adjuvant
    and metastatic settings, and are used in combination with CDK4/6 inhibitors as
    a standard-of-care regimen. AIs require functioning ovarian suppression (or postmenopausal
    status) for clinical activity and are ineffective as monotherapy in premenopausal
    women with intact ovarian function. Musculoskeletal symptoms and bone mineral
    density loss are common class effects requiring monitoring and management.
