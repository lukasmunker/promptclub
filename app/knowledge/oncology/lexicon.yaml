- id: endpoint-os
  term: Overall Survival
  aliases:
  - OS
  category: endpoint
  short_definition: Overall Survival is the time from randomization (or study entry)
    until death from any cause. It is considered the gold-standard efficacy endpoint
    in oncology clinical trials.
  clinical_context: OS is directly observed, is not subject to investigator interpretation,
    and requires no censoring assumptions beyond loss to follow-up. The FDA considers
    OS the most reliable cancer endpoint and it has served as the basis for regulatory
    approval across tumor types. A statistically significant and clinically meaningful
    improvement in OS provides unambiguous evidence of patient benefit. Adequate follow-up
    duration is required, and large sample sizes are often needed to power OS analyses.
