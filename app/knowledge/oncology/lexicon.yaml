- id: biomarker-fgfr-alteration
  term: FGFR Alteration
  aliases:
  - FGFR fusion
  - FGFR amplification
  - FGFR mutation
  - FGFR1 alteration
  - FGFR2 alteration
  - FGFR3 alteration
  category: biomarker
  short_definition: Genomic alterations in Fibroblast Growth Factor Receptor (FGFR)
    genes—including fusions, amplifications, and activating point mutations—that dysregulate
    FGFR signaling and drive tumor proliferation and survival. FGFR alterations are
    predictive biomarkers for FGFR inhibitor therapies.
  clinical_context: FGFR2 fusions (most commonly FGFR2-BICC1 or FGFR2-PPHLN1) occur
    in approximately 10–15% of intrahepatic cholangiocarcinoma and represent the most
    established FGFR-driven oncogenic event. Pemigatinib and futibatinib are FDA-approved
    FGFR inhibitors for previously treated FGFR2-fusion-positive cholangiocarcinoma,
    each requiring FDA-approved companion diagnostic testing. Erdafitinib is FDA-approved
    for FGFR3-altered locally advanced or metastatic urothelial carcinoma. FGFR1 amplification
    occurs frequently in squamous NSCLC but currently lacks approved targeted therapy.
  typical_values: null
  related_terms:
  - FGFR2 fusion
  - FGFR3 mutation
  - cholangiocarcinoma
  - urothelial carcinoma
  - pemigatinib
  - futibatinib
  - erdafitinib
