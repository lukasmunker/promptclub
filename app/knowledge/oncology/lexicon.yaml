- id: tumor-type-sarcoma
  term: Sarcoma
  aliases:
  - soft tissue sarcoma
  - STS
  - bone sarcoma
  - osteosarcoma
  - rhabdomyosarcoma
  - liposarcoma
  - leiomyosarcoma
  category: tumor-type
  short_definition: Sarcomas are a heterogeneous group of malignant mesenchymal neoplasms
    arising from connective tissues including muscle, fat, cartilage, bone, blood
    vessels, and fibrous tissue. They are broadly divided into soft tissue sarcomas
    and primary bone sarcomas, with more than 50 distinct histologic subtypes recognized.
  clinical_context: Sarcomas are rare tumors (approximately 1% of adult malignancies)
    that require multidisciplinary management at specialized centers. Surgical resection
    with negative margins is the cornerstone of curative treatment for localized disease;
    radiation therapy is commonly used for extremity soft tissue sarcomas. First-line
    systemic treatment for advanced unresectable/metastatic soft tissue sarcoma typically
    includes doxorubicin-based chemotherapy; histology-specific regimens (e.g., gemcitabine-docetaxel
    for leiomyosarcoma, trabectedin for myxoid liposarcoma) are also used. Molecular
    profiling for actionable alterations (NTRK fusions, MDM2 amplification) may guide
    targeted therapy selection.
