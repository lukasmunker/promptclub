- id: endpoint-pcr
  term: Pathologic Complete Response
  aliases:
  - pCR
  - pathological complete response
  category: endpoint
  short_definition: Pathologic Complete Response is the absence of residual invasive
    tumor in the surgically resected specimen following neoadjuvant therapy, assessed
    by standard histopathologic examination. It serves as a surrogate for long-term
    outcomes in several neoadjuvant approval settings.
  clinical_context: 'The FDA has used pCR as an endpoint to support accelerated approval
    of neoadjuvant therapies in high-risk early breast cancer, where pCR has been
    associated with improved event-free survival and overall survival at the population
    level. The precise definition of pCR varies: some protocols require absence of
    invasive and in-situ disease in the breast and lymph nodes (ypT0/is ypN0), while
    others accept residual in-situ disease. Regulatory acceptance of pCR as a primary
    endpoint is contingent on the strength of the pCR-to-survival correlation in the
    specific tumor type and treatment context. Post-approval confirmatory trials measuring
    DFS or OS are typically required when approval is granted on the basis of pCR
    alone.'
