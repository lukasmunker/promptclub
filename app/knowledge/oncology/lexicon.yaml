- id: endpoint-qol
  term: Quality of Life
  aliases:
  - QoL
  - Health-Related Quality of Life
  - HRQoL
  category: endpoint
  short_definition: Quality of Life, in the oncology trial context, refers to a patient's
    functional status and subjective experience of health across physical, emotional,
    social, and role domains, typically measured using validated patient-reported
    instruments.
  clinical_context: The FDA guidance on cancer endpoints identifies QoL as a clinical
    benefit endpoint that can support approval when improvement is clinically meaningful,
    with the caveat that QoL instruments must be validated for the specific disease
    setting and adequately powered. QoL data are susceptible to missing-data bias
    due to trial discontinuation related to toxicity or progression; pre-specified
    sensitivity analyses and handling rules for missing data are required. The NCI
    Thesaurus identifies QoL as a multi-dimensional concept encompassing well-being
    across functional and symptomatic domains. Composite QoL scores must be decomposed
    into domain-level results to be clinically interpretable, as improvements in one
    domain may offset declines in another.
