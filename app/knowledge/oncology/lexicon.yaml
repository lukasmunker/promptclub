- id: biomarker-microsatellite-instability
  term: Microsatellite Instability
  aliases:
  - MSI
  - MSI-H
  - Microsatellite Instability-High
  - MSI-L
  - MSS
  category: biomarker
  short_definition: A condition of genomic hypermutability arising from failure of
    the DNA mismatch repair (MMR) system to correct errors in short repetitive DNA
    sequences (microsatellites), resulting in the accumulation of insertions or deletions
    at these loci. MSI-High (MSI-H) status is a pan-tumor predictive biomarker for
    response to immune checkpoint inhibitors.
  clinical_context: MSI-H tumors are found in approximately 15–20% of early-stage
    colorectal cancers, 20–30% of endometrial cancers, and at lower frequencies across
    many solid tumors. Pembrolizumab received the first FDA tumor-agnostic approval
    in 2017 for MSI-H or dMMR solid tumors, followed by nivolumab and dostarlimab
    for specific MSI-H indications. Companion diagnostic MSI testing (by PCR fragment
    analysis or NGS) or MMR protein IHC (as a surrogate) is required per FDA labeling
    for these agents. MSI-H colorectal cancer is also excluded from benefit with anti-EGFR
    therapy in the metastatic setting.
