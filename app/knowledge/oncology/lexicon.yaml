- id: tumor-type-hcc
  term: Hepatocellular Carcinoma
  aliases:
  - HCC
  - hepatocellular cancer
  - liver cell carcinoma
  - primary liver cancer
  category: tumor-type
  short_definition: Hepatocellular carcinoma is the most common primary malignancy
    of the liver, arising from hepatocytes, and is the fourth leading cause of cancer-related
    death globally. It most commonly develops in the setting of underlying liver cirrhosis
    or chronic viral hepatitis.
  clinical_context: HCC risk factors include chronic hepatitis B and C infection,
    alcoholic cirrhosis, nonalcoholic fatty liver disease, and aflatoxin exposure.
    Early-stage HCC is treated with surgical resection, liver transplantation, or
    locoregional ablative therapies. Systemic first-line treatment for advanced unresectable
    HCC includes atezolizumab plus bevacizumab or tremelimumab plus durvalumab; sorafenib
    and lenvatinib remain alternative first-line options. Surveillance with ultrasound
    and AFP is recommended in high-risk populations.
