- id: tumor-type-cml
  term: Chronic Myeloid Leukemia
  aliases:
  - CML
  - chronic myelogenous leukemia
  - chronic granulocytic leukemia
  - BCR-ABL1-positive chronic myeloid leukemia
  category: tumor-type
  short_definition: Chronic myeloid leukemia is a myeloproliferative neoplasm defined
    by the presence of the BCR-ABL1 fusion gene, arising from the Philadelphia chromosome
    t(9;22)(q34;q11), which drives constitutive ABL1 kinase activity and abnormal
    myeloid cell proliferation. It progresses through chronic, accelerated, and blast
    phases.
  clinical_context: CML is a relatively uncommon hematologic malignancy (approximately
    15% of adult leukemias) that typically presents incidentally or with fatigue and
    splenomegaly. First-line treatment with BCR-ABL1 tyrosine kinase inhibitors (imatinib,
    dasatinib, nilotinib, bosutinib, asciminib) has transformed CML into a chronically
    manageable disease with near-normal life expectancy for most patients in chronic
    phase. Treatment-free remission (TFR) is achievable in a subset of patients with
    deep molecular responses. Mutation analysis of the BCR-ABL1 kinase domain guides
    TKI selection in resistant/intolerant disease.
