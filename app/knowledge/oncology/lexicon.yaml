- id: study-design-adaptive-trial
  term: Adaptive Trial
  aliases:
  - Adaptive Design Trial
  - Adaptive Clinical Trial
  - Adaptive Study
  category: study-design
  short_definition: A clinical trial that uses pre-specified rules to modify one or
    more aspects of the trial design (e.g., sample size, randomization ratios, dose
    levels, patient population) based on interim analyses of accumulating data, without
    undermining the validity or integrity of the trial.
  clinical_context: Adaptive designs in oncology can improve efficiency by reducing
    exposure of patients to inferior doses or regimens and by allowing early stopping
    for efficacy or futility. All adaptations must be prospectively defined in the
    protocol and statistical analysis plan before any unblinded data are examined
    to avoid inflation of type I error and operational bias. The FDA Adaptive Design
    guidance specifies that adaptations should be pre-planned, the trial should maintain
    its inferential integrity, and the sponsor should engage FDA early via the Type
    B meeting process. Common oncology applications include adaptive dose-finding
    (Bayesian CRM), seamless Phase II/III designs, and population enrichment.
  typical_values: null
  related_terms:
