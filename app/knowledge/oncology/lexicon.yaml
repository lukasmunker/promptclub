- id: endpoint-ttp
  term: Time to Progression
  aliases:
  - TTP
  category: endpoint
  short_definition: Time to Progression is the time from randomization until objective
    tumor progression, excluding deaths that occur without documented progression.
    It differs from PFS in that deaths are censored rather than counted as events.
  clinical_context: Because deaths unrelated to cancer are censored, TTP may overestimate
    anti-tumor activity when there is differential non-disease mortality between treatment
    arms. The FDA views TTP as a less preferred alternative to PFS for this reason,
    noting that censoring deaths can introduce bias if the censoring is not independent
    of the risk of progression. TTP may nonetheless be useful in diseases with long
    survival after progression where the contribution of death to a PFS endpoint would
    be minimal. Protocols using TTP must pre-specify tumor assessment schedules and
    censoring rules to limit assessment-time bias.
  typical_values: null
  related_terms:
