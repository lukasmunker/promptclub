- id: biomarker-braf-v600e
  term: BRAF V600E Mutation
  aliases:
  - BRAF V600E
  - BRAF p.Val600Glu
  - BRAF codon 600 glutamate substitution
  category: biomarker
  short_definition: A point mutation in exon 15 of the BRAF gene resulting in substitution
    of valine by glutamic acid at codon 600 (V600E), constitutively activating the
    MAPK/ERK kinase cascade. BRAF V600E is a predictive biomarker for response to
    BRAF and MEK inhibitors across multiple tumor types.
  clinical_context: BRAF V600E is present in approximately 50% of cutaneous melanomas,
    10–15% of colorectal cancers, 60% of papillary thyroid cancers, and 1–3% of NSCLCs,
    among other tumors. FDA-approved BRAF/MEK inhibitor combinations (dabrafenib plus
    trametinib; vemurafenib plus cobimetinib; encorafenib plus binimetinib) are indicated
    for BRAF V600E-mutated melanoma and NSCLC; encorafenib plus cetuximab is approved
    for BRAF V600E-mutated colorectal cancer. Companion diagnostic testing for BRAF
    V600E is an FDA requirement for these regimens. Tumor type context matters, as
    colorectal cancers show a more limited and EGFR-inhibitor-resistant phenotype
    compared to melanoma.
  typical_values: null
  related_terms:
  - BRAF V600K
  - MAPK pathway
  - MEK inhibitor
  - dabrafenib
  - vemurafenib
  - trametinib
  - encorafenib
  sources:
