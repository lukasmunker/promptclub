- id: response-criterion-rano
  term: RANO Criteria
  aliases:
  - RANO
  - Response Assessment in Neuro-Oncology Criteria
  - RANO Response Criteria
  category: response-criterion
  short_definition: The RANO (Response Assessment in Neuro-Oncology) Criteria are
    standardized imaging-based response criteria for primary brain tumors, particularly
    gliomas, using bidimensional MRI measurement of contrast-enhancing lesions on
    T1-weighted images combined with assessment of T2/FLAIR signal changes and corticosteroid
    dose. They address the pseudoprogression phenomenon seen after concurrent radiotherapy
    and temozolomide, where early post-treatment MRI changes may mimic progression.
  clinical_context: RANO Criteria were developed for glioblastoma and high-grade gliomas,
    replacing the earlier Macdonald criteria which relied solely on contrast-enhancing
    tumor and did not account for non-enhancing tumor progression or pseudoprogression.
    The criteria incorporate bidimensional measurement of enhancing tumor, T2/FLAIR
    changes as a surrogate for non-enhancing tumor burden, clinical status, and steroid
    use. Pseudoprogression occurring within 12 weeks of completing chemoradiotherapy
    is a recognized challenge requiring either biopsy confirmation or imaging follow-up
    before declaring progression. RANO Criteria are widely adopted in glioma registration
    trials and are recommended by regulatory agencies for neuro-oncology efficacy
    assessments.
