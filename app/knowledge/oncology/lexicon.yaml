- id: treatment-line-adjuvant
  term: Adjuvant Therapy
  aliases:
  - adjuvant treatment
  - adjuvant chemotherapy
  - adjuvant systemic therapy
  - post-operative therapy
  category: treatment-line
  short_definition: Systemic or radiation treatment administered after primary curative-intent
    therapy (typically surgery) to eliminate residual microscopic disease and reduce
    the risk of recurrence. It is given in the absence of clinically detectable disease.
  clinical_context: Adjuvant therapy is initiated after the primary treatment modality
    (most commonly surgical resection with curative intent) has been completed and
    the patient has no evidence of gross residual or metastatic disease. Eligibility
    is gated by pathologic staging, surgical margin status (R0 resection preferred),
    and recovery from operative morbidity. Representative examples include adjuvant
    oxaliplatin-based chemotherapy (FOLFOX or CAPOX) for stage III colon cancer after
    curative resection, and adjuvant trastuzumab for HER2-positive early breast cancer
    after surgery. Endpoints in adjuvant trials are disease-free survival (DFS) or
    overall survival (OS), and treatment duration is typically fixed (e.g., 6 months
    for adjuvant colon cancer chemotherapy).
  typical_values: null
  related_terms:
