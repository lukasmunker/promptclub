  short_definition: Immunohistochemical detection of Programmed Death-Ligand 1 (PD-L1;
    CD274) protein on tumor cells and/or tumor-infiltrating immune cells, quantified
    as Tumor Proportion Score (TPS) or Combined Positive Score (CPS). PD-L1 expression
    is a predictive biomarker for response to PD-1/PD-L1 immune checkpoint inhibitors.
  clinical_context: 'PD-L1 expression measured by validated IHC companion diagnostic
    assays (e.g., 22C3 pharmDx, 28-8 pharmDx, SP142) is required by FDA labeling for
    pembrolizumab monotherapy in multiple indications including NSCLC (TPS ≥1% or
    ≥50%), urothelial carcinoma (CPS ≥10), cervical cancer, and others. PD-L1 TPS
    ≥50% in NSCLC identifies patients most likely to benefit from pembrolizumab monotherapy
    over chemotherapy. Assay-drug concordance is critical: different IHC assays (clones,
    scoring algorithms, cut-offs) are not interchangeable across all indications,
    and the FDA specifies which assay is companion diagnostic vs. complementary for
    each drug-indication pair.'
