- id: resistance-mechanism-histologic-transformation
  term: Histologic transformation
  aliases:
  - small cell transformation
  - small cell lung cancer transformation
  - phenotypic transformation
  - SCLC transformation
  category: resistance-mechanism
  short_definition: A phenotypic switch in which EGFR-mutant non-small-cell lung cancer
    (NSCLC) undergoes conversion to small cell lung cancer (SCLC) histology under
    selective pressure of EGFR tyrosine kinase inhibitor therapy. This lineage plasticity
    event confers resistance by rendering tumor cells independent of oncogenic EGFR
    signaling.
  clinical_context: Histologic transformation to SCLC is observed in approximately
    3–10% of EGFR-mutant NSCLC patients progressing on EGFR TKIs and requires re-biopsy
    with immunohistochemistry (loss of TTF-1, gain of neuroendocrine markers such
    as synaptophysin, chromogranin, and CD56) for diagnosis. The transformed tumors
    retain the original EGFR activating mutation, confirming their clonal origin from
    the NSCLC precursor. Transformed SCLC is typically managed with platinum-based
    chemotherapy regimens used for de novo SCLC, as EGFR-directed therapy is generally
    ineffective after transformation. Concurrent RB1 and TP53 loss are frequently
    present and may predispose to this transformation.
  typical_values: null
