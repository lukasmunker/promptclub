- id: resistance-mechanism-braf-amplification
  term: BRAF amplification
  aliases:
  - BRAF gene amplification
  - BRAF copy number gain
  category: resistance-mechanism
  short_definition: Focal amplification of the BRAF oncogene leading to increased
    BRAF protein levels and reactivation of the MAPK signaling pathway, conferring
    resistance to BRAF inhibitors (BRAFi) in BRAF V600-mutant cancers, most notably
    melanoma. BRAF amplification elevates the total RAF kinase signal, overwhelming
    competitive inhibition by BRAFi.
  clinical_context: BRAF amplification has been identified as an acquired resistance
    mechanism in BRAF V600E-mutant melanoma patients progressing on vemurafenib or
    dabrafenib, detected by FISH or comparative genomic hybridization on re-biopsy
    specimens. The amplification drives MAPK pathway reactivation independently of
    upstream RAS, making it a bypass mechanism that is not fully overcome by adding
    MEK inhibitors alone in all cases. Combination BRAF plus MEK inhibitor regimens
    are the current standard of care, but resistance via BRAF amplification can still
    emerge in this context. Comprehensive next-generation sequencing at progression
    is used to identify BRAF amplification alongside other co-occurring resistance
    events.
  typical_values: null
  related_terms:
  - BRAF V600E
  - MAPK pathway reactivation
  - BRAFi resistance
