- id: biomarker-egfr-mutation
  term: EGFR Mutation
  aliases:
  - EGFR activating mutation
  - EGFR sensitizing mutation
  - Epidermal Growth Factor Receptor mutation
  category: biomarker
  short_definition: Somatic mutations in the Epidermal Growth Factor Receptor (EGFR)
    gene, most commonly exon 19 deletions or the exon 21 L858R point mutation, that
    constitutively activate receptor tyrosine kinase signaling. These sensitizing
    mutations render tumors dependent on EGFR pathway activity and predict response
    to EGFR tyrosine kinase inhibitors.
  clinical_context: EGFR sensitizing mutations are detected in approximately 10–15%
    of non-small cell lung cancers (NSCLC) in Western populations and up to 50% in
    East Asian populations, predominantly in adenocarcinoma histology. Osimertinib
    (Tagrisso), a third-generation EGFR TKI, is FDA-approved as first-line therapy
    for patients with EGFR exon 19 deletions or exon 21 L858R mutations in metastatic
    NSCLC. EGFR mutation testing is an FDA-recognized companion diagnostic requirement
    for osimertinib use. The T790M resistance mutation, detectable on liquid or tissue
    biopsy at progression, also predicts osimertinib response in the second-line setting.
  typical_values: null
  related_terms:
  - EGFR exon 19 deletion
  - EGFR L858R
  - EGFR T790M
  - EGFR exon 20 insertion
  - NSCLC
  - osimertinib
  sources:
  - kind: fda-label
    url: https://www.fda.gov/drugs/science-and-research-drugs/table-pharmacogenomic-biomarkers-drug-labeling
    citation: 'FDA Table of Pharmacogenomic Biomarkers in Drug Labeling. Osimertinib
