# Cloud Build pipeline for the mcp-yallah Cloud Run service.
#
# Triggered manually via `gcloud builds submit` or from deploy.sh. Uses
# Cloud Run's managed source-deploy flow under the hood so we don't have
# to maintain a separate Artifact Registry repo.
#
# Required substitutions (with their defaults for `gcloud builds submit`):
#   _SERVICE      — Cloud Run service name               [default: mcp-yallah]
#   _REGION       — Cloud Run region                     [default: europe-west1]
#   _PROJECT      — GCP project ID                       [default: $PROJECT_ID]
#   _REPO         — Artifact Registry repo for the image [default: cloud-run-source-deploy]
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml .

substitutions:
  _SERVICE: "mcp-yallah"
  _REGION: "europe-west1"
  _REPO: "cloud-run-source-deploy"

steps:
  # 1. Build the container image using the Dockerfile in the repo root.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - "--tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"
      - "."

  # 2. Push both tags to Artifact Registry.
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}"
    waitFor: ["build"]

  # 3. Deploy the new image to Cloud Run (managed platform, public).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--memory=1Gi"
      - "--cpu=1"
      - "--timeout=300"
      - "--max-instances=5"
      - "--concurrency=40"
      - "--set-env-vars=APP_ENV=prod,USER_AGENT=mcp-yallah/0.3.0,GOOGLE_CLOUD_LOCATION=global,GOOGLE_GENAI_USE_VERTEXAI=true,VERTEX_GEMINI_MODEL=gemini-2.5-flash,ENABLE_VERTEX_WEB_SEARCH=true"
    waitFor: ["push"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: "1200s"
